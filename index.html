<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>AI PDF Mobile Reader</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#11130f">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&display=swap"
    rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{

    --bg:#11130f;

    --panel:#1a1c17;

    --border:#35382f;

    --text:#f3f1ea;

    --muted:#9d9987;

    --accent:#9d9162;

    --accent-dark:#7f744d;

    --accent-light:#cab97f;

    --line-height:40px;
}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;

    padding:0;

    width:100%;

    height:100%;

    overflow:hidden;

    background:var(--bg);

    color:var(--text);

    font-family:'Source Serif 4', serif;

    -webkit-font-smoothing:antialiased;
}

body{
    touch-action:pan-y;
}

/* VIEWPORT */

.viewport{

    position:fixed;

    inset:0;

    overflow:hidden;
}

.panels{

    display:flex;

    width:200vw;

    height:100vh;

    transition:transform 0.36s cubic-bezier(.25,.8,.25,1);

    transform:translateX(0);
}

.panel{

    width:100vw;

    height:100vh;

    overflow-y:auto;

    overflow-x:hidden;

    overscroll-behavior:contain;
}

/* HEADER */

header{

    position:sticky;

    top:0;

    z-index:500;

    width:100%;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.toolbar{

    display:flex;

    align-items:center;

    gap:14px;

    width:100%;
}

.header-btn{

    flex:1;
}

button{

    border:none;

    border-radius:14px;

    padding:12px 18px;

    background:var(--accent);

    color:#161710;

    font-weight:700;

    cursor:pointer;

    font-family:inherit;

    transition:0.2s;
}

button:hover{

    background:var(--accent-light);
}

/* PROGRESS */

.progress-wrapper{

    width:100%;

    height:8px;

    background:#272922;

    border-radius:999px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{

    width:0%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--accent-dark),
        var(--accent-light)
    );

    transition:width 0.25s ease;
}

/* FONT CONTROLS */

.font-row{

    position:sticky;

    top:88px;

    z-index:450;

    display:flex;

    justify-content:flex-end;

    padding:12px 16px 0;

    pointer-events:none;
}

.floating{

    display:none;

    position:relative;

    pointer-events:auto;
}

.fab{

    width:42px;

    height:42px;

    border-radius:999px;

    padding:0;

    background:#1a1c17;

    border:1px solid var(--border);

    color:var(--text);

    display:flex;

    align-items:center;

    justify-content:center;
}

.font-panel{

    position:absolute;

    top:54px;

    right:0;

    width:180px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:14px;

    display:none;
}

.font-controls{

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.font-btn{

    width:38px;

    height:38px;

    border-radius:12px;

    background:#2b2e25;

    color:var(--text);

    padding:0;
}

/* PDF */

main{

    width:100%;

    max-width:900px;

    margin:0 auto;

    padding:0 10px 120px;
}

.section{

    width:100%;

    font-size:1rem;

    line-height:1.68;

    word-break:break-word;
}

.smart-heading{

    font-size:2rem;

    line-height:1.12;

    margin-top:3rem;

    margin-bottom:1.3rem;

    font-weight:700;
}

.smart-paragraph{

    margin:0 0 1.45rem;

    text-align:justify;
}

/* INLINE */

.inline-italic{

    font-style:italic;
}

.inline-link{

    color:var(--accent-light);

    text-decoration:underline;

    text-decoration-thickness:1px;

    word-break:break-word;
}

/* LOADING */

.loading{

    text-align:center;

    padding:90px 20px;

    color:var(--muted);
}

/* NOTES */

.notes-panel{

    background:var(--bg);
}

.notes-header{

    position:sticky;

    top:0;

    z-index:400;

    padding:16px;

    display:flex;

    justify-content:flex-end;

    border-bottom:1px solid var(--border);

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);
}

.copy-btn{

    width:42px;

    height:42px;

    border-radius:999px;

    padding:0;

    font-size:18px;
}

/* NOTEBOOK */

.notes-wrapper{

    width:100%;

    max-width:900px;

    margin:0 auto;

    padding:0 10px 120px;
}

.notes-inner{

    position:relative;

    width:100%;
}

.ruling-layer{

    position:absolute;

    inset:0;

    pointer-events:none;

    z-index:1;
}

.ruling-line{

    position:absolute;

    left:0;

    right:0;

    height:1px;

    background:rgba(157,153,135,0.18);
}

.cells-layer{

    position:absolute;

    inset:0;

    z-index:2;
}

.note-row{

    position:absolute;

    left:0;

    right:0;

    min-height:40px;
}

.note-input{

    position:absolute;

    top:0;

    left:0;

    width:100%;

    min-height:40px;

    padding:0;

    margin:0;

    background:transparent;

    border:none;

    outline:none;

    resize:none;

    overflow:hidden;

    color:var(--text);

    font-family:'Source Serif 4', serif;

    font-size:1rem;

    line-height:40px;

    white-space:pre-wrap;

    caret-color:var(--accent-light);

    z-index:10;
}

.note-input.editing{

    background:rgba(255,255,255,0.03);
}

.note-input.closed{

    cursor:text;
}

.note-input.disabled{

    pointer-events:none;

    opacity:0.55;
}

.note-input.covered{

    pointer-events:none;
}

/* LIBRARY */

.library-overlay{

    position:fixed;

    inset:0;

    background:var(--bg);

    z-index:4000;

    display:none;

    overflow-y:auto;
}

.library-header{

    position:sticky;

    top:0;

    z-index:10;

    padding:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    background:rgba(17,19,15,0.96);

    border-bottom:1px solid var(--border);

    backdrop-filter:blur(14px);
}

.icon-btn{

    background:none;

    color:var(--text);

    padding:0;

    font-size:24px;
}

.library-list{

    padding:18px;
}

.library-item{

    display:flex;

    align-items:center;

    gap:12px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:16px;

    margin-bottom:14px;
}

.library-name{

    flex:1;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

    cursor:pointer;
}

.library-meta{

    color:var(--muted);

    font-size:13px;

    margin-top:4px;
}

.remove-btn{

    width:30px;

    height:30px;

    border-radius:999px;

    padding:0;

    background:#2b2e25;

    color:var(--text);

    font-size:16px;
}

/* IMPORT */

.import-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.72);

    backdrop-filter:blur(8px);

    z-index:5000;

    display:none;

    align-items:center;

    justify-content:center;

    padding:20px;
}

.import-modal{

    width:100%;

    max-width:420px;

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:24px;

    overflow:hidden;
}

.import-header{

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:18px;

    border-bottom:1px solid var(--border);

    background:rgba(17,19,15,0.96);
}

.import-body{

    padding:22px;

    display:flex;

    flex-direction:column;

    gap:18px;
}

.import-body input[type="file"]{

    width:100%;
}

.selected-file{

    color:var(--muted);

    font-size:14px;

    word-break:break-word;
}

.extract-btn{

    width:100%;
}

::-webkit-scrollbar{

    width:10px;
}

::-webkit-scrollbar-thumb{

    background:#3c4035;

    border-radius:999px;
}

</style>
</head>

<body>

<div class="viewport">

    <div
        class="panels"
        id="panels">

        <!-- READER -->

        <div
            class="panel"
            id="readerPanel">

            <header>

                <div class="toolbar">

                    <button
                        id="libraryBtn"
                        class="header-btn">
                        Library
                    </button>

                    <button
                        id="importBtn"
                        class="header-btn">
                        Import
                    </button>

                </div>

                <div class="progress-wrapper">

                    <div
                        class="progress-bar"
                        id="progressBar">
                    </div>

                </div>

            </header>

            <div class="font-row">

                <div
                    class="floating"
                    id="fontControls">

                    <button
                        class="fab"
                        id="fontToggle">
                        A+
                    </button>

                    <div
                        class="font-panel"
                        id="fontPanel">

                        <div class="font-controls">

                            <button
                                class="font-btn"
                                id="fontDown">
                                −
                            </button>

                            <div id="fontSizeDisplay">
                                1.00x
                            </div>

                            <button
                                class="font-btn"
                                id="fontUp">
                                +
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <main>

                <section id="reader">

                    <div class="loading">
                        Upload a PDF to begin.
                    </div>

                </section>

            </main>

        </div>

        <!-- NOTES -->

        <div
            class="panel notes-panel"
            id="notesPanel">

            <div class="notes-header">

                <button
                    class="copy-btn"
                    id="copyNotes">
                    ⧉
                </button>

            </div>

            <div
                class="notes-wrapper"
                id="notesWrapper">
            </div>

        </div>

    </div>

</div>

<!-- LIBRARY -->

<div
    class="library-overlay"
    id="libraryOverlay">

    <div class="library-header">

        <button
            class="icon-btn"
            id="closeLibrary">
            ←
        </button>

        <div>
            Library
        </div>

        <div style="width:24px;"></div>

    </div>

    <div
        class="library-list"
        id="libraryList">
    </div>

</div>

<!-- IMPORT -->

<div
    class="import-overlay"
    id="importOverlay">

    <div class="import-modal">

        <div class="import-header">

            <button
                class="icon-btn"
                id="closeImport">
                ←
            </button>

            <div>
                Import PDF
            </div>

            <div style="width:24px;"></div>

        </div>

        <div class="import-body">

            <input
                type="file"
                id="pdfFile"
                accept="application/pdf"
            />

            <div
                class="selected-file"
                id="selectedFile">
            </div>

            <button
                id="processBtn"
                class="extract-btn"
                style="display:none;">
                Extract PDF
            </button>

        </div>

    </div>

</div>

<script>

/* PDF */

const pdfjsLib =
    window['pdfjs-dist/build/pdf'];

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ELEMENTS */

const pdfFile =
    document.getElementById('pdfFile');

const processBtn =
    document.getElementById('processBtn');

const reader =
    document.getElementById('reader');

const progressBar =
    document.getElementById('progressBar');

const notesWrapper =
    document.getElementById('notesWrapper');

const panels =
    document.getElementById('panels');

const readerPanel =
    document.getElementById('readerPanel');

const notesPanel =
    document.getElementById('notesPanel');

const libraryOverlay =
    document.getElementById('libraryOverlay');

const libraryList =
    document.getElementById('libraryList');

const importBtn =
    document.getElementById('importBtn');

const importOverlay =
    document.getElementById('importOverlay');

const closeImport =
    document.getElementById('closeImport');

const selectedFile =
    document.getElementById('selectedFile');

const fontControls =
    document.getElementById('fontControls');

const fontPanel =
    document.getElementById('fontPanel');

const fontToggle =
    document.getElementById('fontToggle');

const fontSizeDisplay =
    document.getElementById('fontSizeDisplay');

/* DATABASE */

const DB_NAME =
    'ai-pdf-reader';

const STORE_NAME =
    'documents';

const LAST_KEY =
    'last-opened-document';

/* STATE */

let currentDocId = null;

let currentFontSize = 1.00;

let showingNotes = false;

let activeInput = null;

/* DATABASE */

function openDatabase(){

    return new Promise((resolve,reject)=>{

        const request =
            indexedDB.open(DB_NAME,2);

        request.onupgradeneeded =
            event=>{

            const db =
                event.target.result;

            if(
                !db.objectStoreNames.contains(
                    STORE_NAME
                )
            ){

                db.createObjectStore(
                    STORE_NAME,
                    {
                        keyPath:'id'
                    }
                );

            }

        };

        request.onsuccess =
            ()=>resolve(
                request.result
            );

        request.onerror =
            ()=>reject(
                request.error
            );

    });

}

/* SAVE */

async function saveRecord(record){

    const db =
        await openDatabase();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE_NAME,
                'readwrite'
            );

        tx.objectStore(STORE_NAME)
            .put(record);

        tx.oncomplete =
            ()=>resolve();

    });

}

/* GET */

async function getAllRecords(){

    const db =
        await openDatabase();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE_NAME,
                'readonly'
            );

        const request =
            tx.objectStore(STORE_NAME)
            .getAll();

        request.onsuccess =
            ()=>resolve(
                request.result || []
            );

    });

}

/* REMOVE */

async function removeRecord(id){

    const db =
        await openDatabase();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE_NAME,
                'readwrite'
            );

        tx.objectStore(STORE_NAME)
            .delete(id);

        tx.oncomplete =
            ()=>resolve();

    });

}

/* PROGRESS */

function setProgress(value){

    progressBar.style.width =
        value + '%';
}

/* FONT */

function updateFont(){

    document
        .querySelectorAll('.section')
        .forEach(section=>{

        section.style.fontSize =
            currentFontSize + 'rem';

    });

    document
        .querySelectorAll('.note-input')
        .forEach(input=>{

        input.style.fontSize =
            currentFontSize + 'rem';

    });

    fontSizeDisplay.textContent =
        currentFontSize.toFixed(2) + 'x';

}

/* CLEAN */

function cleanText(text){

    return text
        .replace(/\s+/g,' ')
        .replace(/-\s+/g,'')
        .trim();

}

/* FONT */

function findDominantFontSize(items){

    const counts = {};

    items.forEach(item=>{

        if(!item.str.trim()){
            return;
        }

        const size =
            Math.round(item.height);

        counts[size] =
            (counts[size] || 0) + 1;

    });

    let dominant = 12;

    let highest = 0;

    Object.entries(counts)
        .forEach(([size,count])=>{

        if(count > highest){

            dominant =
                Number(size);

            highest =
                count;

        }

    });

    return dominant;

}

/* STYLE */

function isBold(item){

    const font =
        item.fontName
        ? item.fontName.toLowerCase()
        : '';

    return (

        font.includes('bold')

        ||

        font.includes('black')

        ||

        font.includes('heavy')

        ||

        font.includes('semibold')

    );

}

function isItalic(item){

    const font =
        item.fontName
        ? item.fontName.toLowerCase()
        : '';

    return (

        font.includes('italic')

        ||

        font.includes('oblique')

    );

}

/* URLS */

function extractLinks(text){

    const links = [];

    const regex =
        /(https?:\/\/|https:|www\.)/gi;

    let match;

    while(
        (
            match = regex.exec(text)
        ) !== null
    ){

        let i =
            match.index;

        let url = '';

        let visibleChars = 0;

        while(i < text.length){

            const char =
                text[i];

            const isWhitespace =

                char === ' '

                ||

                char === '\n'

                ||

                char === '\t';

            if(
                visibleChars < 8
                &&
                isWhitespace
            ){

                i++;
                continue;

            }

            if(
                visibleChars >= 8
                &&
                isWhitespace
            ){

                break;

            }

            if(
                char === ')'
                ||
                char === ']'
                ||
                char === '"'
                ||
                char === "'"
                ||
                char === '<'
                ||
                char === '>'
            ){

                break;

            }

            url += char;

            visibleChars++;

            i++;

        }

        if(url.length >= 8){

            links.push({

                start:
                    match.index,

                raw:url

            });

        }

    }

    return links;

}

/* HTML */

function buildInlineHTML(parts){

    let rawText = '';

    const ranges = [];

    parts.forEach(part=>{

        const start =
            rawText.length;

        rawText += part.text;

        const end =
            rawText.length;

        ranges.push({

            start,

            end,

            italic:
                part.italic

        });

        rawText += ' ';

    });

    rawText =
        rawText.trimEnd();

    const links =
        extractLinks(rawText);

    const fragment =
        document.createDocumentFragment();

    let i = 0;

    while(
        i < rawText.length
    ){

        const link =
            links.find(
                item=>
                item.start === i
            );

        if(link){

            const a =
                document.createElement('a');

            let href =
                link.raw;

            if(
                href.startsWith('www.')
            ){

                href =
                    'https://' + href;

            }

            a.href =
                href;

            a.target =
                '_blank';

            a.rel =
                'noopener noreferrer';

            a.className =
                'inline-link';

            a.textContent =
                link.raw;

            fragment.appendChild(a);

            i +=
                link.raw.length;

            continue;

        }

        const range =
            ranges.find(
                item=>
                i >= item.start
                &&
                i < item.end
            );

        const char =
            rawText[i];

        if(!range){

            fragment.appendChild(
                document.createTextNode(char)
            );

            i++;

            continue;

        }

        const span =
            document.createElement(
                range.italic
                ? 'em'
                : 'span'
            );

        if(range.italic){

            span.className =
                'inline-italic';
        }

        let chunk = '';

        while(

            i < rawText.length

            &&

            i < range.end

        ){

            const nextLink =
                links.find(
                    item=>
                    item.start === i
                );

            if(nextLink){
                break;
            }

            chunk +=
                rawText[i];

            i++;

        }

        span.textContent =
            chunk;

        fragment.appendChild(span);

    }

    return fragment;

}

/* BLOCKS */

function buildBlocks(
    items,
    dominantSize
){

    const blocks = [];

    let current = null;

    let lastY = null;

    let lastType = null;

    items.forEach(item=>{

        const text =
            cleanText(item.str);

        if(!text){
            return;
        }

        const fontSize =
            Math.round(item.height);

        const y =
            item.transform[5];

        const gap =
            lastY !== null
            &&
            Math.abs(y-lastY);

        const heading =
            fontSize > dominantSize
            ||
            isBold(item);

        const type =
            heading
            ? 'heading'
            : 'paragraph';

        const shouldBreak =

            !current

            ||

            type !== lastType

            ||

            gap > 42;

        if(shouldBreak){

            current = {

                type,

                parts:[]

            };

            blocks.push(current);

        }

        current.parts.push({

            text,

            italic:
                isItalic(item)

        });

        lastY = y;

        lastType = type;

    });

    return blocks;

}

/* RENDER */

function renderBlocks(blocks){

    reader.innerHTML = '';

    const wrapper =
        document.createElement('section');

    wrapper.className =
        'section';

    blocks.forEach(block=>{

        if(
            !block.parts.length
        ){
            return;
        }

        if(
            block.type === 'heading'
        ){

            const h =
                document.createElement('h2');

            h.className =
                'smart-heading';

            h.appendChild(
                buildInlineHTML(
                    block.parts
                )
            );

            wrapper.appendChild(h);

        }

        else{

            const p =
                document.createElement('p');

            p.className =
                'smart-paragraph';

            p.appendChild(
                buildInlineHTML(
                    block.parts
                )
            );

            wrapper.appendChild(p);

        }

    });

    reader.appendChild(wrapper);

    updateFont();

}

/* NOTEBOOK */

function autoResize(textarea){

    textarea.style.height =
        '40px';

    textarea.style.height =
        textarea.scrollHeight + 'px';

}

function updateCoveredCells(){

    const inputs =
        [
            ...document.querySelectorAll('.note-input')
        ];

    inputs.forEach(input=>{

        input.classList.remove(
            'covered'
        );

    });

    inputs.forEach(input=>{

        const startLine =
            Number(input.dataset.line);

        const height =
            input.offsetHeight;

        const linesUsed =
            Math.ceil(height / 40);

        if(linesUsed <= 1){
            return;
        }

        for(
            let i = 1;
            i < linesUsed;
            i++
        ){

            const covered =
                document.querySelector(
                    '.note-input[data-line="' +
                    (startLine + i) +
                    '"]'
                );

            if(
                covered
                &&
                covered !== input
            ){

                covered.classList.add(
                    'covered'
                );

            }

        }

    });

}

function updateCellAvailability(){

    document
        .querySelectorAll('.note-input')
        .forEach(input=>{

        if(
            activeInput
            &&
            input !== activeInput
        ){

            input.classList.add(
                'disabled'
            );

        }else{

            input.classList.remove(
                'disabled'
            );

        }

    });

}

async function saveNotes(){

    if(!currentDocId){
        return;
    }

    const notes = {};

    document
        .querySelectorAll('.note-input')
        .forEach(input=>{

        if(
            input.value.trim()
        ){

            notes[
                input.dataset.line
            ] = input.value;

        }

    });

    const records =
        await getAllRecords();

    const record =
        records.find(
            item=>
            item.id === currentDocId
        );

    if(!record){
        return;
    }

    record.notes =
        notes;

    await saveRecord(record);

}

async function closeCurrentInput(){

    if(!activeInput){
        return;
    }

    activeInput.blur();

    activeInput.readOnly = true;

    activeInput.classList.remove(
        'editing'
    );

    activeInput.classList.add(
        'closed'
    );

    activeInput.style.zIndex =
        '5';

    await saveNotes();

    activeInput = null;

    updateCellAvailability();

    updateCoveredCells();

}

function createNotebook(
    totalHeight,
    savedNotes={}
){

    notesWrapper.innerHTML = '';

    const notesInner =
        document.createElement('div');

    notesInner.className =
        'notes-inner';

    notesInner.style.height =
        totalHeight + 'px';

    const rulingLayer =
        document.createElement('div');

    rulingLayer.className =
        'ruling-layer';

    const cellsLayer =
        document.createElement('div');

    cellsLayer.className =
        'cells-layer';

    const lineCount =
        Math.ceil(totalHeight / 40);

    for(
        let i=0;
        i<lineCount;
        i++
    ){

        const line =
            document.createElement('div');

        line.className =
            'ruling-line';

        line.style.top =
            ((i + 1) * 40) - 1 + 'px';

        rulingLayer.appendChild(line);

    }

    for(
        let i=0;
        i<lineCount;
        i++
    ){

        const row =
            document.createElement('div');

        row.className =
            'note-row';

        row.style.top =
            (i * 40) + 'px';

        const input =
            document.createElement('textarea');

        input.className =
            'note-input closed';

        input.dataset.line =
            i;

        input.readOnly =
            true;

        input.spellcheck =
            false;

        input.value =
            savedNotes[i] || '';

        requestAnimationFrame(()=>{

            autoResize(input);

            updateCoveredCells();

        });

        input.addEventListener(
            'click',
            event=>{

            event.stopPropagation();

            if(
                input.classList.contains(
                    'covered'
                )
            ){
                return;
            }

            if(
                activeInput
                &&
                activeInput !== input
            ){
                return;
            }

            input.readOnly = false;

            input.classList.remove(
                'closed'
            );

            input.classList.add(
                'editing'
            );

            input.style.zIndex =
                '999';

            activeInput = input;

            updateCellAvailability();

            input.focus();

        });

        input.addEventListener(
            'input',
            ()=>{

            autoResize(input);

            updateCoveredCells();

        });

        row.appendChild(input);

        cellsLayer.appendChild(row);

    }

    notesInner.appendChild(
        rulingLayer
    );

    notesInner.appendChild(
        cellsLayer
    );

    notesWrapper.appendChild(
        notesInner
    );

    updateFont();

}

/* EXTRACTION */

async function extractPdf(file){

    const buffer =
        await file.arrayBuffer();

    const loadingTask =
        pdfjsLib.getDocument({
            data:buffer
        });

    const pdf =
        await loadingTask.promise;

    const allItems = [];

    for(
        let page=1;
        page<=pdf.numPages;
        page++
    ){

        const pdfPage =
            await pdf.getPage(page);

        const content =
            await pdfPage.getTextContent();

        allItems.push(
            ...content.items
        );

        setProgress(
            (
                page /
                pdf.numPages
            ) * 100
        );

    }

    const dominant =
        findDominantFontSize(
            allItems
        );

    const blocks =
        buildBlocks(
            allItems,
            dominant
        );

    return {

        dominant,

        blocks

    };

}

/* LOAD DOCUMENT */

async function processRecord(record){

    try{

        currentDocId =
            record.id;

        localStorage.setItem(
            LAST_KEY,
            record.id
        );

        reader.innerHTML = `
            <div class="loading">
                Loading document...
            </div>
        `;

        setProgress(0);

        /* STORED EXTRACTED TEXT */

        if(
            !record.blocks
            ||
            !Array.isArray(record.blocks)
        ){

            throw new Error(
                'Missing extracted text.'
            );

        }

        renderBlocks(
            record.blocks
        );

        requestAnimationFrame(()=>{

            createNotebook(
                reader.scrollHeight,
                record.notes || {}
            );

        });

        fontControls.style.display =
            'block';

        setProgress(100);

    }catch(error){

        console.error(error);

        try{

            await removeRecord(
                record.id
            );

            if(
                localStorage.getItem(
                    LAST_KEY
                ) === record.id
            ){

                localStorage.removeItem(
                    LAST_KEY
                );

            }

        }catch(removeError){

            console.error(removeError);

        }

        reader.innerHTML = `
            <div class="loading">
                Corrupted saved document removed.
            </div>
        `;

        setProgress(0);

    }

}

/* IMPORT NEW FILE */

async function processNewFile(file){

    if(!file){

        alert(
            'Please upload a PDF first.'
        );

        return;

    }

    try{

        reader.innerHTML = `
            <div class="loading">
                Extracting PDF...
            </div>
        `;

        setProgress(0);

        const extracted =
            await extractPdf(file);

        const record = {

            id:
                Date.now().toString(),

            name:
                file.name,

            blocks:
                extracted.blocks,

            notes:{},

            created:
                Date.now()

        };

        await saveRecord(record);

        await processRecord(record);

    }catch(error){

        console.error(error);

        reader.innerHTML = `
            <div class="loading">
                Failed to extract PDF.
            </div>
        `;

        setProgress(0);

    }

}

/* LIBRARY */

async function renderLibrary(){

    const records =
        await getAllRecords();

    libraryList.innerHTML = '';

    if(!records.length){

        libraryList.innerHTML = `
            <div class="loading">
                No saved documents yet.
            </div>
        `;

        return;

    }

    records
        .sort(
            (a,b)=>
            b.created - a.created
        )
        .forEach(record=>{

        const item =
            document.createElement('div');

        item.className =
            'library-item';

        const info =
            document.createElement('div');

        info.style.flex =
            '1';

        const name =
            document.createElement('div');

        name.className =
            'library-name';

        name.textContent =
            record.name;

        const meta =
            document.createElement('div');

        meta.className =
            'library-meta';

        meta.textContent =
            'Stored extracted text';

        info.appendChild(name);

        info.appendChild(meta);

        info.addEventListener(
            'click',
            async ()=>{

            libraryOverlay.style.display =
                'none';

            await processRecord(
                record
            );

        });

        const remove =
            document.createElement('button');

        remove.className =
            'remove-btn';

        remove.textContent =
            '×';

        remove.addEventListener(
            'click',
            async event=>{

            event.stopPropagation();

            await removeRecord(
                record.id
            );

            renderLibrary();

        });

        item.appendChild(info);

        item.appendChild(remove);

        libraryList.appendChild(item);

    });

}

/* NOTES SWIPE */

function openNotes(){

    showingNotes = true;

    panels.style.transform =
        'translateX(-100vw)';

    notesPanel.scrollTop =
        readerPanel.scrollTop;

}

function closeNotes(){

    showingNotes = false;

    panels.style.transform =
        'translateX(0)';

    readerPanel.scrollTop =
        notesPanel.scrollTop;

}

let startX = 0;

let startY = 0;

document.addEventListener(
    'touchstart',
    event=>{

    startX =
        event.touches[0].clientX;

    startY =
        event.touches[0].clientY;

});

document.addEventListener(
    'touchend',
    event=>{

    const endX =
        event.changedTouches[0].clientX;

    const endY =
        event.changedTouches[0].clientY;

    const diffX =
        endX - startX;

    const diffY =
        Math.abs(
            endY - startY
        );

    if(diffY > 80){
        return;
    }

    if(
        diffX < -90
        &&
        !showingNotes
    ){

        openNotes();

    }

    if(
        diffX > 90
        &&
        showingNotes
    ){

        closeNotes();

    }

});

document.addEventListener(

    const clickedInput =
        event.target.classList.contains(
            'note-input'

});

/* AUTO LOAD */

window.addEventListener(
    'load',
    async ()=>{

    try{

        const lastId =
            localStorage.getItem(
                LAST_KEY
            );

        if(!lastId){
            return;
        }

        const records =
            await getAllRecords();

        const record =
            records.find(
                item=>
                item.id === lastId
            );

        if(record){

            await processRecord(
                record
            );

        }

    }catch(error){

        console.error(error);

    }

});

/* CLOSE FONT PANEL */

document.addEventListener(
    'click',
    event=>{

    const inside =
        fontPanel.contains(
            event.target
        );

    const toggle =
        fontToggle.contains(
            event.target
        );

    if(
        !inside
        &&
        !toggle
    ){

        fontPanel.style.display =
            'none';

    }

});
