<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>AI PDF Mobile Reader</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#11130f">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&display=swap"
    rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{

    --bg:#11130f;

    --panel:#1a1c17;

    --border:#35382f;

    --text:#f3f1ea;

    --muted:#9d9987;

    --accent:#9d9162;

    --accent-dark:#7f744d;

    --accent-light:#cab97f;
}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;

    padding:0;

    width:100%;

    overflow-x:hidden;

    background:var(--bg);
}

body{

    color:var(--text);

    font-family:'Source Serif 4', serif;

    -webkit-font-smoothing:antialiased;
}

/* HEADER */

header{

    position:sticky;

    top:0;

    z-index:500;

    width:100%;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.toolbar{

    display:flex;

    flex-wrap:wrap;

    align-items:center;

    gap:10px;
}

input[type="file"]{

    color:var(--muted);

    font-family:inherit;

    max-width:100%;
}

button{

    border:none;

    border-radius:14px;

    padding:12px 18px;

    background:var(--accent);

    color:#161710;

    font-weight:700;

    cursor:pointer;

    font-family:inherit;
}

button:hover{

    background:var(--accent-light);
}

#status{

    color:var(--muted);

    font-size:14px;
}

/* PROGRESS */

.progress-wrapper{

    width:100%;

    height:8px;

    background:#272922;

    border-radius:999px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{

    width:0%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--accent-dark),
        var(--accent-light)
    );

    transition:width 0.25s ease;
}

/* FONT BAR */

.font-bar{

    position:sticky;

    top:86px;

    z-index:450;

    width:100%;

    display:flex;

    justify-content:flex-end;

    padding:10px 16px 0;

    pointer-events:none;
}

.floating{

    position:relative;

    display:none;

    pointer-events:auto;
}

.fab{

    width:38px;

    height:38px;

    border-radius:999px;

    background:#1a1c17;

    border:1px solid var(--border);

    color:var(--text);

    font-size:13px;

    font-weight:700;

    padding:0;

    display:flex;

    align-items:center;

    justify-content:center;
}

/* FONT PANEL */

.font-panel{

    position:absolute;

    top:50px;

    right:0;

    width:170px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:14px;

    display:none;

    box-shadow:0 14px 40px rgba(0,0,0,0.45);
}

.font-controls{

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.font-btn{

    width:38px;

    height:38px;

    border-radius:12px;

    border:none;

    background:#2b2e25;

    color:var(--text);

    font-size:16px;

    padding:0;
}

.font-size-display{

    color:var(--muted);
}

/* MAIN */

main{

    width:100%;

    max-width:900px;

    margin:0 auto;

    padding:12px 22px 120px;
}

/* READER */

.section{

    width:100%;

    font-size:1rem;

    line-height:1.68;
}

.smart-heading{

    font-size:2rem;

    margin-top:3rem;

    margin-bottom:1.3rem;

    font-weight:700;
}

.smart-paragraph{

    margin:0 0 1.55rem;

    text-align:justify;

    position:relative;

    padding-left:12px;
}

.smart-paragraph::before{

    content:"";

    position:absolute;

    left:0;

    top:0;

    bottom:0;

    width:2px;

    background:transparent;

    transition:background 0.2s ease;
}

.smart-paragraph:active::before{

    background:var(--accent-light);
}

/* LOADING */

.loading{

    text-align:center;

    padding:90px 20px;

    color:var(--muted);
}

/* OVERLAYS */

.overlay{

    position:fixed;

    inset:0;

    background:var(--bg);

    z-index:3000;

    display:none;

    overflow-y:auto;
}

.overlay-header{

    position:sticky;

    top:0;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.overlay-title{

    font-size:1.05rem;

    font-weight:700;
}

.icon-btn{

    background:none;

    color:var(--text);

    padding:0;

    font-size:22px;
}

/* LIBRARY */

.library-list{

    padding:18px;
}

.library-item{

    display:flex;

    align-items:center;

    gap:12px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:16px;

    margin-bottom:14px;
}

.library-name{

    flex:1;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

    cursor:pointer;
}

.remove-btn{

    width:30px;

    height:30px;

    border-radius:999px;

    padding:0;

    background:#2b2e25;

    color:var(--text);

    font-size:16px;
}

/* NOTES */

.notes-content{

    padding:18px;
}

.note-card{

    margin-bottom:26px;
}

.note-source{

    color:var(--text);

    line-height:1.5;

    margin-bottom:10px;
}

.note-input{

    width:100%;

    min-height:120px;

    border-radius:14px;

    border:1px solid var(--border);

    background:#1a1c17;

    color:var(--text);

    padding:14px;

    font-family:inherit;

    font-size:1rem;

    resize:vertical;
}

@media(max-width:700px){

    .smart-heading{

        font-size:1.65rem;
    }

}

</style>
</head>

<body>

<header>

    <div class="toolbar">

        <button id="libraryBtn">
            Library
        </button>

        <input
            type="file"
            id="pdfFile"
            accept="application/pdf"
        />

        <button id="processBtn">
            Extract PDF
        </button>

        <span id="status">
            Ready
        </span>

    </div>

    <div class="progress-wrapper">

        <div
            class="progress-bar"
            id="progressBar">
        </div>

    </div>

</header>

<div class="font-bar">

    <div
        class="floating"
        id="fontControls">

        <button
            class="fab"
            id="fontToggle">
            A+
        </button>

        <div
            class="font-panel"
            id="fontPanel">

            <div class="font-controls">

                <button
                    class="font-btn"
                    id="fontDown">
                    −
                </button>

                <div
                    class="font-size-display"
                    id="fontSizeDisplay">
                    1.00x
                </div>

                <button
                    class="font-btn"
                    id="fontUp">
                    +
                </button>

            </div>

        </div>

    </div>

</div>

<main>

    <section id="reader">

        <div class="loading">
            Upload a PDF to begin.
        </div>

    </section>

</main>

<!-- LIBRARY -->

<div
    class="overlay"
    id="libraryOverlay">

    <div class="overlay-header">

        <button
            class="icon-btn"
            id="closeLibrary">
            ←
        </button>

        <div class="overlay-title">
            Library
        </div>

        <div style="width:22px;"></div>

    </div>

    <div
        class="library-list"
        id="libraryList">
    </div>

</div>

<!-- NOTES -->

<div
    class="overlay"
    id="notesOverlay">

    <div class="overlay-header">

        <button
            class="icon-btn"
            id="closeNotes">
            ←
        </button>

        <div class="overlay-title">
            Notes
        </div>

        <button
            class="icon-btn"
            id="copyNotes">
            ⧉
        </button>

    </div>

    <div
        class="notes-content"
        id="notesContent">
    </div>

</div>

<script>

/* PDF */

const pdfjsLib =
    window['pdfjs-dist/build/pdf'];

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ELEMENTS */

const pdfFile =
    document.getElementById('pdfFile');

const processBtn =
    document.getElementById('processBtn');

const libraryBtn =
    document.getElementById('libraryBtn');

const reader =
    document.getElementById('reader');

const statusText =
    document.getElementById('status');

const progressBar =
    document.getElementById('progressBar');

const fontControls =
    document.getElementById('fontControls');

const fontToggle =
    document.getElementById('fontToggle');

const fontPanel =
    document.getElementById('fontPanel');

const fontSizeDisplay =
    document.getElementById('fontSizeDisplay');

const libraryOverlay =
    document.getElementById('libraryOverlay');

const libraryList =
    document.getElementById('libraryList');

const notesOverlay =
    document.getElementById('notesOverlay');

const notesContent =
    document.getElementById('notesContent');

/* STORAGE */

const DB_NAME =
    'ai-pdf-reader';

const STORE_NAME =
    'pdfs';

const LAST_KEY =
    'last-opened-pdf';

/* STATE */

let currentFontSize = 1.00;

let currentPdfId = null;

let currentParagraphs = [];

/* DATABASE */

function openDatabase(){

    return new Promise((resolve,reject)=>{

        const request =
            indexedDB.open(DB_NAME,1);

        request.onupgradeneeded =
            event=>{

            const db =
                event.target.result;

            if(
                !db.objectStoreNames.contains(
                    STORE_NAME
                )
            ){

                db.createObjectStore(
                    STORE_NAME,
                    {
                        keyPath:'id'
                    }
                );

            }

        };

        request.onsuccess =
            ()=>resolve(
                request.result
            );

        request.onerror =
            ()=>reject(
                request.error
            );

    });

}

/* SAVE */

async function savePdfRecord(record){

    const db =
        await openDatabase();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE_NAME,
                'readwrite'
            );

        tx.objectStore(STORE_NAME)
            .put(record);

        tx.oncomplete =
            ()=>resolve();

    });

}

/* GET ALL */

async function getAllPdfs(){

    const db =
        await openDatabase();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE_NAME,
                'readonly'
            );

        const request =
            tx.objectStore(STORE_NAME)
            .getAll();

        request.onsuccess =
            ()=>resolve(
                request.result || []
            );

    });

}

/* DELETE */

async function removePdf(id){

    const db =
        await openDatabase();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE_NAME,
                'readwrite'
            );

        tx.objectStore(STORE_NAME)
            .delete(id);

        tx.oncomplete =
            ()=>resolve();

    });

}

/* LOCAL STORAGE */

function setLastOpened(id){

    localStorage.setItem(
        LAST_KEY,
        id
    );

}

function getLastOpened(){

    return localStorage.getItem(
        LAST_KEY
    );

}

/* STATUS */

function setStatus(text){

    statusText.textContent =
        text;
}

/* PROGRESS */

function setProgress(percent){

    progressBar.style.width =
        percent + '%';
}

/* FONT */

function updateFont(){

    document
        .querySelectorAll('.section')
        .forEach(section=>{

            section.style.fontSize =
                currentFontSize + 'rem';

        });

    fontSizeDisplay.textContent =
        currentFontSize.toFixed(2) + 'x';

}

/* CLEAN */

function cleanText(text){

    return text

        .replace(/\s+/g,' ')

        .replace(/-\s+/g,'')

        .trim();

}

/* DOMINANT FONT */

function findDominantFontSize(items){

    const counts = {};

    items.forEach(item=>{

        if(!item.str.trim()){
            return;
        }

        const size =
            Math.round(item.height);

        counts[size] =
            (counts[size] || 0) + 1;

    });

    let dominant = 12;

    let highest = 0;

    Object.entries(counts)
        .forEach(([size,count])=>{

        if(count > highest){

            dominant =
                Number(size);

            highest =
                count;

        }

    });

    return dominant;

}

/* BOLD */

function isBold(item){

    const font =
        item.fontName
        ? item.fontName.toLowerCase()
        : '';

    return (

        font.includes('bold')

        ||

        font.includes('black')

        ||

        font.includes('heavy')

        ||

        font.includes('semibold')

    );

}

/* BUILD BLOCKS */

function buildBlocks(
    items,
    dominantSize
){

    const blocks = [];

    let currentBlock = null;

    let lastY = null;

    let lastType = null;

    items.forEach(item=>{

        const text =
            cleanText(item.str);

        if(!text){
            return;
        }

        const fontSize =
            Math.round(item.height);

        const y =
            item.transform[5];

        const gap =
            lastY !== null
            &&
            Math.abs(y-lastY);

        const heading =
            fontSize > dominantSize
            ||
            isBold(item);

        const type =
            heading
            ? 'heading'
            : 'paragraph';

        const shouldBreak =

            !currentBlock

            ||

            type !== lastType

            ||

            gap > 42;

        if(shouldBreak){

            currentBlock = {

                type,

                text:''

            };

            blocks.push(
                currentBlock
            );

        }

        currentBlock.text +=
            (
                currentBlock.text
                ? ' '
                : ''
            ) + text;

        lastY = y;

        lastType = type;

    });

    return blocks;

}

/* RENDER */

function renderBlocks(blocks){

    currentParagraphs = [];

    reader.innerHTML = '';

    const wrapper =
        document.createElement('section');

    wrapper.className =
        'section';

    blocks.forEach(block=>{

        const text =
            block.text.trim();

        if(!text){
            return;
        }

        if(
            block.type === 'heading'
        ){

            const h =
                document.createElement('h2');

            h.className =
                'smart-heading';

            h.textContent =
                text;

            wrapper.appendChild(h);

        }

        else{

            currentParagraphs.push(
                text
            );

            const p =
                document.createElement('p');

            p.className =
                'smart-paragraph';

            p.textContent =
                text;

            wrapper.appendChild(p);

        }

    });

    reader.appendChild(wrapper);

    updateFont();

}

/* PROCESS */

async function processPdfRecord(record){

    try{

        currentPdfId =
            record.id;

        setLastOpened(
            record.id
        );

        reader.innerHTML = `
            <div class="loading">
                Processing PDF...
            </div>
        `;

        fontControls.style.display =
            'none';

        setStatus(
            'Loading PDF...'
        );

        setProgress(0);

        const buffer =
            await record.file.arrayBuffer();

        const loadingTask =
            pdfjsLib.getDocument({
                data:buffer
            });

        const pdf =
            await loadingTask.promise;

        const allItems = [];

        for(
            let page=1;
            page<=pdf.numPages;
            page++
        ){

            setStatus(
                'Reading page ' +
                page +
                ' of ' +
                pdf.numPages
            );

            const pdfPage =
                await pdf.getPage(page);

            const content =
                await pdfPage.getTextContent();

            allItems.push(
                ...content.items
            );

            setProgress(
                (
                    page /
                    pdf.numPages
                ) * 100
            );

        }

        const dominant =
            findDominantFontSize(
                allItems
            );

        const blocks =
            buildBlocks(
                allItems,
                dominant
            );

        renderBlocks(
            blocks
        );

        fontControls.style.display =
            'block';

        setStatus(
            'Complete'
        );

    }catch(error){

        console.error(error);

        setStatus(
            'Error'
        );

        reader.innerHTML = `
            <div class="loading">
                Error processing PDF.
            </div>
        `;

    }

}

/* PROCESS FILE */

async function processNewFile(file){

    if(!file){

        alert(
            'Please upload a PDF first.'
        );

        return;
    }

    const id =
        Date.now().toString();

    const record = {

        id,

        name:file.name,

        file,

        notes:{},

        created:Date.now()

    };

    await savePdfRecord(
        record
    );

    await processPdfRecord(
        record
    );

}

/* LIBRARY */

async function renderLibrary(){

    const items =
        await getAllPdfs();

    libraryList.innerHTML = '';

    if(!items.length){

        libraryList.innerHTML = `
            <div class="loading">
                No PDFs saved yet.
            </div>
        `;

        return;
    }

    items
        .sort(
            (a,b)=>
            b.created - a.created
        )
        .forEach(item=>{

        const row =
            document.createElement('div');

        row.className =
            'library-item';

        const name =
            document.createElement('div');

        name.className =
            'library-name';

        name.textContent =
            item.name;

        name.addEventListener(
            'click',
            async ()=>{

            libraryOverlay.style.display =
                'none';

            await processPdfRecord(
                item
            );

        });

        const remove =
            document.createElement('button');

        remove.className =
            'remove-btn';

        remove.textContent =
            '×';

        remove.addEventListener(
            'click',
            async event=>{

            event.stopPropagation();

            await removePdf(
                item.id
            );

            renderLibrary();

        });

        row.appendChild(name);

        row.appendChild(remove);

        libraryList.appendChild(row);

    });

}

/* NOTES */

async function openNotes(){

    if(!currentPdfId){
        return;
    }

    notesOverlay.style.display =
        'block';

    notesContent.innerHTML = '';

    const items =
        await getAllPdfs();

    const current =
        items.find(
            item=>
            item.id === currentPdfId
        );

    if(!current){
        return;
    }

    const notes =
        current.notes || {};

    currentParagraphs.forEach(
        (paragraph,index)=>{

        const card =
            document.createElement('div');

        card.className =
            'note-card';

        const source =
            document.createElement('div');

        source.className =
            'note-source';

        source.textContent =
            paragraph;

        const input =
            document.createElement('textarea');

        input.className =
            'note-input';

        input.placeholder =
            'Write notes...';

        input.value =
            notes[index] || '';

        input.addEventListener(
            'input',
            async ()=>{

            notes[index] =
                input.value;

            current.notes =
                notes;

            await savePdfRecord(
                current
            );

        });

        card.appendChild(source);

        card.appendChild(input);

        notesContent.appendChild(card);

    });

}

/* COPY NOTES */

document
    .getElementById('copyNotes')
    .addEventListener(
        'click',
        ()=>{

        const text =
            [
                ...document.querySelectorAll(
                    '.note-input'
                )
            ]
            .map(
                note=>note.value
            )
            .filter(Boolean)
            .join('\n\n');

        navigator.clipboard.writeText(
            text
        );

});

/* SWIPE */

let touchStartX = 0;

let touchStartY = 0;

document.addEventListener(
    'touchstart',
    event=>{

    touchStartX =
        event.changedTouches[0]
        .screenX;

    touchStartY =
        event.changedTouches[0]
        .screenY;

});

document.addEventListener(
    'touchend',
    event=>{

    const endX =
        event.changedTouches[0]
        .screenX;

    const endY =
        event.changedTouches[0]
        .screenY;

    const diffX =
        endX - touchStartX;

    const diffY =
        Math.abs(
            endY - touchStartY
        );

    if(

        diffX > 120

        &&

        diffY < 80

    ){

        openNotes();

    }

});

/* BUTTONS */

processBtn.addEventListener(
    'click',
    ()=>{

    processNewFile(
        pdfFile.files[0]
    );

});

libraryBtn.addEventListener(
    'click',
    ()=>{

    libraryOverlay.style.display =
        'block';

    renderLibrary();

});

document
    .getElementById('closeLibrary')
    .addEventListener(
        'click',
        ()=>{

        libraryOverlay.style.display =
            'none';

});

document
    .getElementById('closeNotes')
    .addEventListener(
        'click',
        ()=>{

        notesOverlay.style.display =
            'none';

});

/* FONT */

fontToggle.addEventListener(
    'click',
    ()=>{

    fontPanel.style.display =

        fontPanel.style.display ===
        'block'

        ? 'none'
        : 'block';

});

document
    .getElementById('fontUp')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize += 0.08;

        updateFont();

});

document
    .getElementById('fontDown')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize =
            Math.max(
                0.75,
                currentFontSize - 0.08
            );

        updateFont();

});

/* AUTO LOAD LAST PDF */

window.addEventListener(
    'load',
    async ()=>{

    try{

        const lastId =
            getLastOpened();

        if(!lastId){
            return;
        }

        const items =
            await getAllPdfs();

        const lastPdf =
            items.find(
                item=>
                item.id === lastId
            );

        if(lastPdf){

            await processPdfRecord(
                lastPdf
            );

        }

    }catch(error){

        console.error(error);

    }

});

/* CLOSE FONT PANEL */

document.addEventListener(
    'click',
    event=>{

    const inside =
        fontPanel.contains(
            event.target
        );

    const toggle =
        fontToggle.contains(
            event.target
        );

    if(
        !inside
        &&
        !toggle
    ){

        fontPanel.style.display =
            'none';

    }

});

/* SERVICE WORKER */

if(
    'serviceWorker'
    in navigator
){

    window.addEventListener(
        'load',
        ()=>{

        navigator.serviceWorker.register(
            './service-worker.js'
        );

    });

}

</script>

</body>
</html>
