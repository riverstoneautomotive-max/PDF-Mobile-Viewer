<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>AI PDF Mobile Reader</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#11130f">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&display=swap"
    rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{

    --bg:#11130f;

    --panel:#1a1c17;

    --border:#35382f;

    --text:#f3f1ea;

    --muted:#9d9987;

    --accent:#9d9162;

    --accent-dark:#7f744d;

    --accent-light:#cab97f;

    --line-height:40px;
}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;

    padding:0;

    width:100%;

    height:100%;

    overflow:hidden;

    background:var(--bg);

    color:var(--text);

    font-family:'Source Serif 4', serif;

    -webkit-font-smoothing:antialiased;
}

body{

    touch-action:pan-y;
}

/* VIEWPORT */

.viewport{

    position:fixed;

    inset:0;

    overflow:hidden;
}

.panels{

    display:flex;

    width:200vw;

    height:100vh;

    transition:transform 0.36s cubic-bezier(.25,.8,.25,1);

    transform:translateX(0);
}

.panel{

    width:100vw;

    height:100vh;

    overflow-y:auto;

    overflow-x:hidden;

    overscroll-behavior:contain;
}

/* HEADER */

header{

    width:100%;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.toolbar{

    display:flex;

    align-items:center;

    gap:12px;
}

.header-btn{

    flex:1;

    text-align:center;
}

button{

    border:none;

    border-radius:14px;

    padding:12px 18px;

    background:var(--accent);

    color:#161710;

    font-weight:700;

    cursor:pointer;

    font-family:inherit;

    transition:0.2s;
}

button:hover{

    background:var(--accent-light);
}

#status{

    display:block;

    margin-top:12px;

    color:var(--muted);

    font-size:14px;
}

/* PROGRESS */

.progress-wrapper{

    width:100%;

    height:8px;

    background:#272922;

    border-radius:999px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{

    width:0%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--accent-dark),
        var(--accent-light)
    );

    transition:width 0.25s ease;
}

/* IMPORT MODAL */

.import-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.72);

    backdrop-filter:blur(8px);

    z-index:5000;

    display:none;

    align-items:center;

    justify-content:center;

    padding:20px;
}

.import-modal{

    width:100%;

    max-width:420px;

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:24px;

    overflow:hidden;
}

.import-header{

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:18px;

    border-bottom:1px solid var(--border);

    background:rgba(17,19,15,0.96);
}

.import-body{

    padding:22px;

    display:flex;

    flex-direction:column;

    gap:18px;
}

.import-body input[type="file"]{

    width:100%;

    color:var(--muted);

    font-family:inherit;
}

.selected-file{

    color:var(--muted);

    font-size:14px;

    word-break:break-word;
}

.extract-btn{

    width:100%;
}

/* FONT */

.font-row{

    display:flex;

    justify-content:flex-end;

    padding:12px 16px 0;
}

.floating{

    display:none;

    position:relative;
}

.fab{

    width:38px;

    height:38px;

    border-radius:999px;

    padding:0;

    background:#1a1c17;

    border:1px solid var(--border);

    color:var(--text);

    display:flex;

    align-items:center;

    justify-content:center;
}

.font-panel{

    position:absolute;

    top:50px;

    right:0;

    width:170px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:14px;

    display:none;
}

.font-controls{

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.font-btn{

    width:38px;

    height:38px;

    border-radius:12px;

    background:#2b2e25;

    color:var(--text);

    padding:0;
}

/* PDF */

main{

    width:100%;

    max-width:860px;

    margin:0 auto;

    padding:0 24px 120px;
}

.section{

    width:100%;

    font-size:1rem;

    line-height:1.68;
}

.smart-heading{

    font-size:2rem;

    line-height:1.14;

    margin-top:3rem;

    margin-bottom:1.3rem;

    font-weight:700;
}

.smart-paragraph{

    margin:0 0 1.55rem;

    text-align:justify;
}

.loading{

    text-align:center;

    padding:90px 20px;

    color:var(--muted);
}

/* NOTES */

.notes-panel{

    background:var(--bg);
}

.notes-header{

    padding:16px;

    display:flex;

    justify-content:flex-end;

    border-bottom:1px solid var(--border);

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);
}

.copy-btn{

    width:42px;

    height:42px;

    border-radius:999px;

    padding:0;

    font-size:18px;
}

/* NOTEBOOK */

.notes-wrapper{

    width:100%;

    max-width:860px;

    margin:0 auto;

    padding:0 24px 120px;
}

.notes-inner{

    position:relative;

    width:100%;
}

/* RULING LAYER */

.ruling-layer{

    position:absolute;

    inset:0;

    pointer-events:none;

    z-index:1;
}

.ruling-line{

    position:absolute;

    left:0;

    right:0;

    height:1px;

    background:rgba(157,153,135,0.18);
}

/* CELLS */

.cells-layer{

    position:absolute;

    inset:0;

    z-index:2;
}

.note-row{

    position:absolute;

    left:0;

    right:0;

    height:40px;

    overflow:visible;
}

/* INPUT */

.note-input{

    position:absolute;

    top:0;

    left:0;

    width:100%;

    min-height:40px;

    padding:0;

    margin:0;

    background:transparent;

    border:none;

    outline:none;

    resize:none;

    overflow:hidden;

    color:var(--text);

    font-family:'Source Serif 4', serif;

    font-size:1rem;

    line-height:40px;

    white-space:pre-wrap;

    display:block;

    caret-color:var(--accent-light);

    z-index:10;
}

.note-input.editing{

    background:rgba(17,19,15,0.05);
}

.note-input.closed{

    cursor:text;
}

.note-input.disabled{

    pointer-events:none;

    opacity:0.7;
}

.note-input.covered{

    pointer-events:none;
}

/* LIBRARY */

.library-overlay{

    position:fixed;

    inset:0;

    background:var(--bg);

    z-index:4000;

    display:none;

    overflow-y:auto;
}

.library-header{

    position:sticky;

    top:0;

    padding:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    background:rgba(17,19,15,0.96);

    border-bottom:1px solid var(--border);

    backdrop-filter:blur(14px);
}

.icon-btn{

    background:none;

    color:var(--text);

    padding:0;

    font-size:24px;
}

.library-list{

    padding:18px;
}

.library-item{

    display:flex;

    align-items:center;

    gap:12px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:16px;

    margin-bottom:14px;
}

.library-name{

    flex:1;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

    cursor:pointer;
}

.remove-btn{

    width:30px;

    height:30px;

    border-radius:999px;

    padding:0;

    background:#2b2e25;

    color:var(--text);

    font-size:16px;
}

::-webkit-scrollbar{

    width:10px;
}

::-webkit-scrollbar-thumb{

    background:#3c4035;

    border-radius:999px;
}

</style>
</head>

<body>

<div class="viewport">

    <div
        class="panels"
        id="panels">

        <!-- PDF -->

        <div
            class="panel"
            id="readerPanel">

            <header>

                <div class="toolbar">

                    <button
                        id="libraryBtn"
                        class="header-btn">
                        Library
                    </button>

                    <button
                        id="importBtn"
                        class="header-btn">
                        Import
                    </button>

                </div>

                <span id="status">
                    Ready
                </span>

                <div class="progress-wrapper">

                    <div
                        class="progress-bar"
                        id="progressBar">
                    </div>

                </div>

            </header>

            <!-- EVERYTHING ELSE REMAINS IDENTICAL -->

            <!-- Keep ALL your original remaining HTML exactly as-is below this point -->

        </div>

    </div>

</div>

<!-- IMPORT MODAL -->

<div
    class="import-overlay"
    id="importOverlay">

    <div class="import-modal">

        <div class="import-header">

            <button
                class="icon-btn"
                id="closeImport">
                ←
            </button>

            <div>
                Import PDF
            </div>

            <div style="width:24px;"></div>

        </div>

        <div class="import-body">

            <input
                type="file"
                id="pdfFile"
                accept="application/pdf"
            />

            <div
                class="selected-file"
                id="selectedFile">
            </div>

            <button
                id="processBtn"
                class="extract-btn"
                style="display:none;">
                Extract PDF
            </button>

        </div>

    </div>

</div>

<script>

/* KEEP ALL YOUR ORIGINAL JAVASCRIPT EXACTLY AS-IS */

/* ONLY REPLACE THE OLD BUTTON/FILE INPUT REFERENCES WITH THESE */

const pdfFile =
    document.getElementById('pdfFile');

const processBtn =
    document.getElementById('processBtn');

const importBtn =
    document.getElementById('importBtn');

const importOverlay =
    document.getElementById('importOverlay');

const closeImport =
    document.getElementById('closeImport');

const selectedFile =
    document.getElementById('selectedFile');

/* REMOVE YOUR OLD processBtn EVENT LISTENER */
/* REPLACE IT WITH THIS */

/* IMPORT MODAL */

importBtn.addEventListener(
    'click',
    ()=>{

    importOverlay.style.display =
        'flex';

});

closeImport.addEventListener(
    'click',
    ()=>{

    importOverlay.style.display =
        'none';

});

pdfFile.addEventListener(
    'change',
    ()=>{

    const file =
        pdfFile.files[0];

    if(!file){

        selectedFile.textContent =
            '';

        processBtn.style.display =
            'none';

        return;

    }

    selectedFile.textContent =
        file.name;

    processBtn.style.display =
        'block';

});

processBtn.addEventListener(
    'click',
    async ()=>{

    const file =
        pdfFile.files[0];

    if(!file){

        alert(
            'Please choose a PDF first.'
        );

        return;

    }

    importOverlay.style.display =
        'none';

    processBtn.style.display =
        'none';

    selectedFile.textContent =
        '';

    await processNewFile(file);

    pdfFile.value = '';

});

</script>

</body>
</html>
