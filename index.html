<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>AI PDF Mobile Reader</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#11130f">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&display=swap"
    rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{

    --bg:#11130f;

    --panel:#1a1c17;

    --border:#35382f;

    --text:#f3f1ea;

    --muted:#9d9987;

    --accent:#9d9162;

    --accent-dark:#7f744d;

    --accent-light:#cab97f;
}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;

    padding:0;

    width:100%;

    overflow-x:hidden;
}

html{

    background:var(--bg);

    scroll-behavior:smooth;
}

body{

    background:var(--bg);

    color:var(--text);

    font-family:'Source Serif 4', serif;

    -webkit-font-smoothing:antialiased;

    text-rendering:optimizeLegibility;
}

/* HEADER */

header{

    position:sticky;

    top:0;

    z-index:500;

    width:100%;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.toolbar{

    display:flex;

    flex-wrap:wrap;

    align-items:center;

    gap:12px;

    width:100%;
}

input[type="file"]{

    color:var(--muted);

    font-family:inherit;

    max-width:100%;
}

button{

    border:none;

    border-radius:14px;

    padding:12px 18px;

    background:var(--accent);

    color:#161710;

    font-weight:700;

    cursor:pointer;

    font-family:inherit;

    transition:all 0.2s ease;
}

button:hover{

    background:var(--accent-light);
}

#status{

    color:var(--muted);

    font-size:14px;
}

/* PROGRESS */

.progress-wrapper{

    width:100%;

    height:8px;

    background:#272922;

    border-radius:999px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{

    width:0%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--accent-dark),
        var(--accent-light)
    );

    transition:width 0.25s ease;
}

/* FONT BAR */

.font-bar{

    position:sticky;

    top:86px;

    z-index:450;

    width:100%;

    display:flex;

    justify-content:flex-end;

    padding:10px 16px 0;

    background:transparent;

    pointer-events:none;
}

.floating{

    position:relative;

    display:none;

    pointer-events:auto;
}

/* MAIN */

main{

    width:100%;

    max-width:900px;

    margin:0 auto;

    padding:12px 22px 120px;
}

/* DOCUMENT */

.section{

    width:100%;

    font-size:1rem;

    line-height:1.68;

    letter-spacing:0.01em;

    overflow-wrap:break-word;

    hyphens:auto;
}

/* HEADINGS */

.smart-heading{

    font-size:2rem;

    line-height:1.14;

    margin-top:3rem;

    margin-bottom:1.3rem;

    font-weight:700;
}

/* PARAGRAPHS */

.smart-paragraph{

    margin:0 0 1.55rem;

    text-align:justify;

    text-justify:inter-word;
}

/* LINKS */

.smart-link{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:14px;

    margin:1.4rem 0 2rem;

    padding:16px 18px;

    border-radius:18px;

    background:#1b1d18;

    border:1px solid var(--border);

    color:var(--accent-light);

    text-decoration:none;

    line-height:1.5;

    transition:all 0.2s ease;

    word-break:break-word;
}

.smart-link:hover{

    background:#252822;
}

.smart-link::after{

    content:"↗";

    opacity:0.7;
}

/* LOADING */

.loading{

    text-align:center;

    padding:90px 20px;

    color:var(--muted);

    font-size:1.05rem;
}

/* FONT BUTTON */

.fab{

    width:38px;

    height:38px;

    border-radius:999px;

    background:rgba(26,28,23,0.96);

    border:1px solid var(--border);

    color:var(--text);

    font-size:13px;

    font-weight:700;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;
}

/* FONT PANEL */

.font-panel{

    position:absolute;

    top:50px;

    right:0;

    width:170px;

    background:rgba(26,28,23,0.98);

    border:1px solid var(--border);

    border-radius:18px;

    padding:14px;

    z-index:2000;

    display:none;

    box-shadow:0 14px 40px rgba(0,0,0,0.45);
}

.font-panel-title{

    font-size:12px;

    text-transform:uppercase;

    letter-spacing:2px;

    color:var(--muted);

    margin-bottom:14px;

    font-family:system-ui,sans-serif;
}

.font-controls{

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.font-btn{

    width:38px;

    height:38px;

    border-radius:12px;

    border:none;

    background:#2b2e25;

    color:var(--text);

    font-size:16px;

    cursor:pointer;
}

.font-size-display{

    font-size:14px;

    color:var(--muted);

    min-width:42px;

    text-align:center;

    font-family:system-ui,sans-serif;
}

::selection{

    background:#5b5537;

    color:white;
}

::-webkit-scrollbar{

    width:10px;
}

::-webkit-scrollbar-thumb{

    background:#3c4035;

    border-radius:999px;
}

@media(max-width:700px){

    .smart-heading{

        font-size:1.65rem;
    }

}

</style>
</head>

<body>

<header>

    <div class="toolbar">

        <input
            type="file"
            id="pdfFile"
            accept="application/pdf"
        />

        <button id="processBtn">
            Extract PDF
        </button>

        <span id="status">
            Ready
        </span>

    </div>

    <div class="progress-wrapper">

        <div
            class="progress-bar"
            id="progressBar">
        </div>

    </div>

</header>

<!-- FONT BUTTON BELOW HEADER -->

<div class="font-bar">

    <div
        class="floating"
        id="fontControls">

        <button
            class="fab"
            id="fontToggle">
            A+
        </button>

        <div
            class="font-panel"
            id="fontPanel">

            <div class="font-panel-title">
                Font Size
            </div>

            <div class="font-controls">

                <button
                    class="font-btn"
                    id="fontDown">
                    −
                </button>

                <div
                    class="font-size-display"
                    id="fontSizeDisplay">
                    1.00x
                </div>

                <button
                    class="font-btn"
                    id="fontUp">
                    +
                </button>

            </div>

        </div>

    </div>

</div>

<main>

    <section
        id="reader">

        <div class="loading">
            Upload a PDF to begin.
        </div>

    </section>

</main>

<script>

/* PDF.JS */

const pdfjsLib =
    window['pdfjs-dist/build/pdf'];

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ELEMENTS */

const pdfFile =
    document.getElementById('pdfFile');

const processBtn =
    document.getElementById('processBtn');

const reader =
    document.getElementById('reader');

const statusText =
    document.getElementById('status');

const progressBar =
    document.getElementById('progressBar');

const fontControls =
    document.getElementById('fontControls');

const fontToggle =
    document.getElementById('fontToggle');

const fontPanel =
    document.getElementById('fontPanel');

const fontSizeDisplay =
    document.getElementById('fontSizeDisplay');

/* FONT */

let currentFontSize = 1.00;

/* STORAGE */

const DB_NAME =
    'pdf-reader-db';

const STORE_NAME =
    'pdf-store';

const LAST_PDF_KEY =
    'last-pdf';

/* DATABASE */

function openDatabase(){

    return new Promise((resolve,reject)=>{

        const request =
            indexedDB.open(DB_NAME,1);

        request.onupgradeneeded =
            event=>{

            const db =
                event.target.result;

            if(
                !db.objectStoreNames.contains(
                    STORE_NAME
                )
            ){

                db.createObjectStore(
                    STORE_NAME
                );
            }

        };

        request.onsuccess =
            ()=>resolve(
                request.result
            );

        request.onerror =
            ()=>reject(
                request.error
            );

    });

}

/* SAVE PDF */

async function saveLastPdf(file){

    const db =
        await openDatabase();

    const transaction =
        db.transaction(
            STORE_NAME,
            'readwrite'
        );

    const store =
        transaction.objectStore(
            STORE_NAME
        );

    store.put(
        file,
        LAST_PDF_KEY
    );

}

/* LOAD PDF */

async function loadLastPdf(){

    return new Promise(
        async (resolve,reject)=>{

        const db =
            await openDatabase();

        const transaction =
            db.transaction(
                STORE_NAME,
                'readonly'
            );

        const store =
            transaction.objectStore(
                STORE_NAME
            );

        const request =
            store.get(
                LAST_PDF_KEY
            );

        request.onsuccess =
            ()=>resolve(
                request.result
            );

        request.onerror =
            ()=>reject(
                request.error
            );

    });

}

/* STATUS */

function setStatus(text){

    statusText.textContent =
        text;
}

/* PROGRESS */

function setProgress(percent){

    progressBar.style.width =
        percent + '%';
}

/* FONT */

function updateFont(){

    document
        .querySelectorAll('.section')
        .forEach(section=>{

            section.style.fontSize =
                currentFontSize + 'rem';

        });

    fontSizeDisplay.textContent =
        currentFontSize.toFixed(2) + 'x';
}

/* CLEAN TEXT */

function cleanText(text){

    return text

        .replace(/\s+/g,' ')

        .replace(/-\s+/g,'')

        .trim();
}

/* SPLIT PARAGRAPHS */

function splitLongParagraph(text){

    const sentences =
        text.match(
            /[^.!?]+[.!?]+/g
        ) || [text];

    if(
        sentences.length < 7
    ){

        return [text];
    }

    const chunks = [];

    let current = '';

    sentences.forEach(sentence=>{

        const proposed =
            current + ' ' + sentence;

        if(
            proposed.length > 650
        ){

            chunks.push(
                current.trim()
            );

            current =
                sentence;

        }else{

            current +=
                ' ' + sentence;
        }

    });

    if(current.trim()){

        chunks.push(
            current.trim()
        );
    }

    return chunks;
}

/* URL */

function extractUrl(text){

    const match =
        text.match(
            /(https?:\/\/[^\s]+|www\.[^\s]+)/i
        );

    return match
        ? match[0]
        : null;
}

/* LINK */

function createLink(url){

    let href = url;

    if(
        !href.startsWith('http')
    ){

        href =
            'https://' + href;
    }

    const link =
        document.createElement('a');

    link.className =
        'smart-link';

    link.href =
        href;

    link.target =
        '_blank';

    link.rel =
        'noopener noreferrer';

    link.textContent =
        url;

    return link;
}

/* DOMINANT FONT */

function findDominantFontSize(items){

    const counts = {};

    items.forEach(item=>{

        if(!item.str.trim()){
            return;
        }

        const size =
            Math.round(item.height);

        counts[size] =
            (counts[size] || 0) + 1;
    });

    let dominant = 12;

    let highest = 0;

    Object.entries(counts)
        .forEach(([size,count])=>{

        if(count > highest){

            highest = count;

            dominant = Number(size);
        }

    });

    return dominant;
}

/* BOLD */

function isBold(item){

    const fontName =

        item.fontName
        ? item.fontName.toLowerCase()
        : '';

    return (

        fontName.includes('bold')

        ||

        fontName.includes('black')

        ||

        fontName.includes('heavy')

        ||

        fontName.includes('semibold')

    );
}

/* CAPS HEADINGS */

function isAllCapsHeading(text){

    const cleaned =

        text
            .replace(/[^A-Z\s]/g,'');

    if(
        cleaned.length < 5
    ){
        return false;
    }

    return (

        text === text.toUpperCase()

        &&

        /[A-Z]/.test(text)

    );
}

/* BUILD BLOCKS */

function buildBlocks(
    items,
    dominantSize
){

    const blocks = [];

    let currentBlock = null;

    let lastY = null;

    let lastType = null;

    items.forEach(item=>{

        const text =
            cleanText(item.str);

        if(!text){
            return;
        }

        const fontSize =
            Math.round(item.height);

        const y =
            item.transform[5];

        const verticalGap =

            lastY !== null

            &&

            Math.abs(y - lastY);

        const isNewLine =
            verticalGap > 5;

        const allCapsHeading =

            isNewLine

            &&

            isAllCapsHeading(text);

        const isHeading =

            fontSize > dominantSize

            ||

            isBold(item)

            ||

            allCapsHeading;

        const type =
            isHeading
            ? 'heading'
            : 'paragraph';

        const shouldBreak =

            !currentBlock

            ||

            (
                type !== lastType
            )

            ||

            (
                verticalGap > 42
            );

        if(shouldBreak){

            currentBlock = {

                type,

                text:''
            };

            blocks.push(currentBlock);
        }

        currentBlock.text +=
            (
                currentBlock.text
                ? ' '
                : ''
            ) + text;

        lastY = y;

        lastType = type;

    });

    return blocks;
}

/* RENDER */

function renderBlocks(blocks){

    reader.innerHTML = '';

    const wrapper =
        document.createElement('section');

    wrapper.className =
        'section';

    blocks.forEach(block=>{

        const text =
            block.text.trim();

        if(!text){
            return;
        }

        if(
            extractUrl(text)
        ){

            wrapper.appendChild(
                createLink(
                    extractUrl(text)
                )
            );

            return;
        }

        if(
            block.type === 'heading'
        ){

            const h =
                document.createElement('h2');

            h.className =
                'smart-heading';

            h.textContent =
                text;

            wrapper.appendChild(h);
        }

        else{

            const pieces =
                splitLongParagraph(text);

            pieces.forEach(piece=>{

                const p =
                    document.createElement('p');

                    p.className =
                        'smart-paragraph';

                    p.textContent =
                        piece;

                    wrapper.appendChild(p);

            });

        }

    });

    reader.appendChild(wrapper);
}

/* PROCESS PDF */

async function processPdf(file){

    try{

        if(!file){

            alert(
                'Please upload a PDF first.'
            );

            return;
        }

        await saveLastPdf(file);

        reader.innerHTML = `
            <div class="loading">
                Processing PDF...
            </div>
        `;

        fontControls.style.display =
            'none';

        setProgress(0);

        setStatus(
            'Loading PDF...'
        );

        const buffer =
            await file.arrayBuffer();

        const loadingTask =
            pdfjsLib.getDocument({
                data:buffer
            });

        const pdf =
            await loadingTask.promise;

        const allItems = [];

        for(

            let pageNumber = 1;

            pageNumber <= pdf.numPages;

            pageNumber++

        ){

            setStatus(
                `Reading page ${pageNumber} of ${pdf.numPages}`
            );

            const page =
                await pdf.getPage(
                    pageNumber
                );

            const content =
                await page.getTextContent();

            allItems.push(
                ...content.items
            );

            setProgress(
                (
                    pageNumber /
                    pdf.numPages
                ) * 100
            );

        }

        setStatus(
            'Analyzing document...'
        );

        const dominantSize =
            findDominantFontSize(
                allItems
            );

        const blocks =
            buildBlocks(
                allItems,
                dominantSize
            );

        setStatus(
            'Rendering document...'
        );

        renderBlocks(blocks);

        updateFont();

        setProgress(100);

        setStatus(
            'Complete'
        );

        fontControls.style.display =
            'block';

    }catch(error){

        console.error(error);

        reader.innerHTML = `
            <div class="loading">
                Error processing PDF.
            </div>
        `;

        setStatus(
            'Error'
        );

        setProgress(0);
    }

}

/* BUTTON */

processBtn.addEventListener(
    'click',
    ()=>{

    const file =
        pdfFile.files[0];

    processPdf(file);

});

/* AUTO LOAD */

window.addEventListener(
    'load',
    async ()=>{

    try{

        const savedPdf =
            await loadLastPdf();

        if(savedPdf){

            setStatus(
                'Reloading last PDF...'
            );

            await processPdf(
                savedPdf
            );

        }

    }catch(error){

        console.error(error);
    }

});

/* TOGGLE PANEL */

fontToggle.addEventListener(
    'click',
    ()=>{

    fontPanel.style.display =

        fontPanel.style.display ===
        'block'

        ? 'none'

        : 'block';

});

/* FONT UP */

document
    .getElementById('fontUp')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize += 0.08;

        updateFont();

});

/* FONT DOWN */

document
    .getElementById('fontDown')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize =
            Math.max(
                0.75,
                currentFontSize - 0.08
            );

        updateFont();

});

/* CLOSE PANEL */

document.addEventListener(
    'click',
    event=>{

    const insidePanel =
        fontPanel.contains(
            event.target
        );

    const clickedToggle =
        fontToggle.contains(
            event.target
        );

    if(
        !insidePanel
        &&
        !clickedToggle
    ){

        fontPanel.style.display =
            'none';
    }

});

/* SERVICE WORKER */

if(
    'serviceWorker'
    in navigator
){

    window.addEventListener(
        'load',
        ()=>{

        navigator.serviceWorker.register(
            './service-worker.js'
        );

    });

}

</script>

</body>
</html>
