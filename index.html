<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>AI PDF Mobile Reader</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#11130f">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&display=swap"
    rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{

    --bg:#11130f;

    --panel:#1a1c17;

    --border:#35382f;

    --text:#f3f1ea;

    --muted:#9d9987;

    --accent:#9d9162;

    --accent-dark:#7f744d;

    --accent-light:#cab97f;
}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;

    padding:0;

    width:100%;

    overflow-x:hidden;

    background:var(--bg);
}

body{

    color:var(--text);

    font-family:'Source Serif 4', serif;

    -webkit-font-smoothing:antialiased;
}

/* HEADER */

header{

    position:sticky;

    top:0;

    z-index:500;

    width:100%;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.toolbar{

    display:flex;

    flex-wrap:wrap;

    align-items:center;

    gap:10px;
}

input[type="file"]{

    color:var(--muted);

    font-family:inherit;
}

button{

    border:none;

    border-radius:14px;

    padding:12px 18px;

    background:var(--accent);

    color:#161710;

    font-weight:700;

    cursor:pointer;

    font-family:inherit;
}

#status{

    color:var(--muted);

    font-size:14px;
}

/* PROGRESS */

.progress-wrapper{

    width:100%;

    height:8px;

    background:#272922;

    border-radius:999px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{

    width:0%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--accent-dark),
        var(--accent-light)
    );
}

/* FONT BAR */

.font-bar{

    position:sticky;

    top:86px;

    z-index:450;

    width:100%;

    display:flex;

    justify-content:flex-end;

    padding:10px 16px 0;

    pointer-events:none;
}

.floating{

    position:relative;

    display:none;

    pointer-events:auto;
}

.fab{

    width:38px;

    height:38px;

    border-radius:999px;

    background:#1a1c17;

    border:1px solid var(--border);

    color:var(--text);

    font-size:13px;

    padding:0;

    display:flex;

    align-items:center;

    justify-content:center;
}

/* PANEL */

.font-panel{

    position:absolute;

    top:50px;

    right:0;

    width:170px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:14px;

    display:none;
}

.font-controls{

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.font-btn{

    width:38px;

    height:38px;

    border-radius:12px;

    padding:0;

    background:#2b2e25;

    color:var(--text);
}

.font-size-display{

    color:var(--muted);
}

/* MAIN */

main{

    width:100%;

    max-width:900px;

    margin:0 auto;

    padding:12px 22px 120px;
}

/* DOCUMENT */

.section{

    width:100%;

    font-size:1rem;

    line-height:1.68;
}

.smart-heading{

    font-size:2rem;

    margin-top:3rem;

    margin-bottom:1.2rem;

    font-weight:700;
}

.smart-paragraph{

    margin:0 0 1.4rem;

    text-align:justify;
}

/* LIBRARY */

.library-screen,
.notes-screen{

    position:fixed;

    inset:0;

    background:var(--bg);

    z-index:3000;

    overflow-y:auto;

    display:none;
}

.screen-header{

    position:sticky;

    top:0;

    background:rgba(17,19,15,0.97);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);

    padding:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.back-btn,
.copy-btn{

    background:none;

    color:var(--text);

    font-size:22px;

    padding:0;

    border:none;
}

.library-list{

    padding:18px;
}

.library-item{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:10px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:16px;

    margin-bottom:14px;
}

.library-name{

    flex:1;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;
}

.remove-btn{

    width:30px;

    height:30px;

    border-radius:999px;

    padding:0;

    background:#2b2e25;

    color:var(--text);
}

/* NOTES */

.notes-content{

    padding:20px;
}

.note-line{

    margin-bottom:22px;
}

.note-source{

    color:var(--text);

    margin-bottom:8px;

    line-height:1.5;
}

.note-input{

    width:100%;

    min-height:90px;

    border-radius:14px;

    background:#1a1c17;

    border:1px solid var(--border);

    color:var(--text);

    padding:14px;

    font-family:inherit;

    resize:vertical;
}

.loading{

    text-align:center;

    padding:90px 20px;

    color:var(--muted);
}

@media(max-width:700px){

    .smart-heading{

        font-size:1.65rem;
    }

}

</style>
</head>

<body>

<header>

    <div class="toolbar">

        <button id="libraryBtn">
            Library
        </button>

        <input
            type="file"
            id="pdfFile"
            accept="application/pdf"
        />

        <button id="processBtn">
            Extract PDF
        </button>

        <span id="status">
            Ready
        </span>

    </div>

    <div class="progress-wrapper">

        <div
            class="progress-bar"
            id="progressBar">
        </div>

    </div>

</header>

<div class="font-bar">

    <div
        class="floating"
        id="fontControls">

        <button
            class="fab"
            id="fontToggle">
            A+
        </button>

        <div
            class="font-panel"
            id="fontPanel">

            <div class="font-controls">

                <button
                    class="font-btn"
                    id="fontDown">
                    −
                </button>

                <div
                    class="font-size-display"
                    id="fontSizeDisplay">
                    1.00x
                </div>

                <button
                    class="font-btn"
                    id="fontUp">
                    +
                </button>

            </div>

        </div>

    </div>

</div>

<main>

    <section
        id="reader">

        <div class="loading">
            Upload a PDF to begin.
        </div>

    </section>

</main>

<!-- LIBRARY -->

<div
    class="library-screen"
    id="libraryScreen">

    <div class="screen-header">

        <button
            class="back-btn"
            id="closeLibrary">
            ←
        </button>

        <div>
            Library
        </div>

        <div></div>

    </div>

    <div
        class="library-list"
        id="libraryList">
    </div>

</div>

<!-- NOTES -->

<div
    class="notes-screen"
    id="notesScreen">

    <div class="screen-header">

        <button
            class="back-btn"
            id="closeNotes">
            ←
        </button>

        <div>
            Notes
        </div>

        <button
            class="copy-btn"
            id="copyNotes">
            ⧉
        </button>

    </div>

    <div
        class="notes-content"
        id="notesContent">
    </div>

</div>

<script>

/* PDF.JS */

const pdfjsLib =
    window['pdfjs-dist/build/pdf'];

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ELEMENTS */

const pdfFile =
    document.getElementById('pdfFile');

const processBtn =
    document.getElementById('processBtn');

const libraryBtn =
    document.getElementById('libraryBtn');

const reader =
    document.getElementById('reader');

const statusText =
    document.getElementById('status');

const progressBar =
    document.getElementById('progressBar');

const fontControls =
    document.getElementById('fontControls');

const fontToggle =
    document.getElementById('fontToggle');

const fontPanel =
    document.getElementById('fontPanel');

const fontSizeDisplay =
    document.getElementById('fontSizeDisplay');

const libraryScreen =
    document.getElementById('libraryScreen');

const libraryList =
    document.getElementById('libraryList');

const notesScreen =
    document.getElementById('notesScreen');

const notesContent =
    document.getElementById('notesContent');

/* STATE */

let currentFontSize = 1.00;

let currentPdfId = null;

let currentBlocks = [];

/* STORAGE */

const DB_NAME =
    'pdf-reader-db';

const STORE_NAME =
    'pdf-library';

/* DATABASE */

function openDatabase(){

    return new Promise((resolve,reject)=>{

        const request =
            indexedDB.open(DB_NAME,1);

        request.onupgradeneeded =
            event=>{

            const db =
                event.target.result;

            if(
                !db.objectStoreNames.contains(
                    STORE_NAME
                )
            ){

                db.createObjectStore(
                    STORE_NAME,
                    {
                        keyPath:'id'
                    }
                );
            }

        };

        request.onsuccess =
            ()=>resolve(
                request.result
            );

        request.onerror =
            ()=>reject(
                request.error
            );

    });

}

/* SAVE PDF */

async function savePdfToLibrary(
    id,
    name,
    file,
    notes={}
){

    const db =
        await openDatabase();

    const tx =
        db.transaction(
            STORE_NAME,
            'readwrite'
        );

    tx.objectStore(STORE_NAME)
        .put({
            id,
            name,
            file,
            notes
        });

}

/* GET LIBRARY */

async function getLibrary(){

    return new Promise(
        async resolve=>{

        const db =
            await openDatabase();

        const tx =
            db.transaction(
                STORE_NAME,
                'readonly'
            );

        const request =
            tx.objectStore(STORE_NAME)
            .getAll();

        request.onsuccess =
            ()=>resolve(
                request.result
            );

    });

}

/* DELETE */

async function deletePdf(id){

    const db =
        await openDatabase();

    const tx =
        db.transaction(
            STORE_NAME,
            'readwrite'
        );

    tx.objectStore(STORE_NAME)
        .delete(id);
}

/* FONT */

function updateFont(){

    document
        .querySelectorAll('.section')
        .forEach(section=>{

            section.style.fontSize =
                currentFontSize + 'rem';

        });

    fontSizeDisplay.textContent =
        currentFontSize.toFixed(2) + 'x';
}

/* STATUS */

function setStatus(text){

    statusText.textContent =
        text;
}

/* PROGRESS */

function setProgress(percent){

    progressBar.style.width =
        percent + '%';
}

/* CLEAN */

function cleanText(text){

    return text
        .replace(/\s+/g,' ')
        .replace(/-\s+/g,'')
        .trim();
}

/* DOMINANT FONT */

function findDominantFontSize(items){

    const counts = {};

    items.forEach(item=>{

        if(!item.str.trim()){
            return;
        }

        const size =
            Math.round(item.height);

        counts[size] =
            (counts[size] || 0) + 1;
    });

    return Number(
        Object.keys(counts)
        .sort(
            (a,b)=>
            counts[b]-counts[a]
        )[0]
    ) || 12;
}

/* BOLD */

function isBold(item){

    const fontName =
        item.fontName
        ? item.fontName.toLowerCase()
        : '';

    return (
        fontName.includes('bold')
        ||
        fontName.includes('black')
        ||
        fontName.includes('heavy')
        ||
        fontName.includes('semibold')
    );
}

/* BUILD BLOCKS */

function buildBlocks(
    items,
    dominantSize
){

    const blocks = [];

    let currentBlock = null;

    let lastY = null;

    let lastType = null;

    items.forEach(item=>{

        const text =
            cleanText(item.str);

        if(!text){
            return;
        }

        const fontSize =
            Math.round(item.height);

        const y =
            item.transform[5];

        const gap =
            lastY !== null
            &&
            Math.abs(y-lastY);

        const heading =
            fontSize > dominantSize
            ||
            isBold(item);

        const type =
            heading
            ? 'heading'
            : 'paragraph';

        const shouldBreak =
            !currentBlock
            ||
            type !== lastType
            ||
            gap > 42;

        if(shouldBreak){

            currentBlock = {
                type,
                text:''
            };

            blocks.push(
                currentBlock
            );
        }

        currentBlock.text +=
            (
                currentBlock.text
                ? ' '
                : ''
            ) + text;

        lastY = y;

        lastType = type;

    });

    return blocks;
}

/* RENDER */

function renderBlocks(blocks){

    currentBlocks = blocks;

    reader.innerHTML = '';

    const wrapper =
        document.createElement('section');

    wrapper.className =
        'section';

    blocks.forEach(block=>{

        const text =
            block.text.trim();

        if(!text){
            return;
        }

        if(
            block.type === 'heading'
        ){

            const h =
                document.createElement('h2');

            h.className =
                'smart-heading';

            h.textContent =
                text;

            wrapper.appendChild(h);

        }else{

            const p =
                document.createElement('p');

            p.className =
                'smart-paragraph';

            p.textContent =
                text;

            wrapper.appendChild(p);

        }

    });

    reader.appendChild(wrapper);

    updateFont();
}

/* PROCESS */

async function processPdf(
    file,
    existingId=null
){

    try{

        if(!file){
            return;
        }

        reader.innerHTML = `
            <div class="loading">
                Processing PDF...
            </div>
        `;

        setStatus(
            'Loading PDF...'
        );

        setProgress(0);

        const buffer =
            await file.arrayBuffer();

        const loadingTask =
            pdfjsLib.getDocument({
                data:buffer
            });

        const pdf =
            await loadingTask.promise;

        const allItems = [];

        for(
            let page=1;
            page<=pdf.numPages;
            page++
        ){

            const pdfPage =
                await pdf.getPage(page);

            const content =
                await pdfPage.getTextContent();

            allItems.push(
                ...content.items
            );

            setProgress(
                (page/pdf.numPages)*100
            );
        }

        const dominant =
            findDominantFontSize(
                allItems
            );

        const blocks =
            buildBlocks(
                allItems,
                dominant
            );

        renderBlocks(blocks);

        fontControls.style.display =
            'block';

        currentPdfId =
            existingId
            ||
            Date.now().toString();

        const library =
            await getLibrary();

        const existing =
            library.find(
                item=>
                item.id === currentPdfId
            );

        await savePdfToLibrary(
            currentPdfId,
            file.name,
            file,
            existing?.notes || {}
        );

        setStatus(
            'Complete'
        );

    }catch(error){

        console.error(error);

        setStatus(
            'Error'
        );
    }

}

/* LIBRARY RENDER */

async function renderLibrary(){

    const items =
        await getLibrary();

    libraryList.innerHTML = '';

    if(!items.length){

        libraryList.innerHTML = `
            <div class="loading">
                No PDFs saved yet.
            </div>
        `;

        return;
    }

    items.reverse().forEach(item=>{

        const row =
            document.createElement('div');

        row.className =
            'library-item';

        const name =
            document.createElement('div');

        name.className =
            'library-name';

        name.textContent =
            item.name;

        name.onclick =
            async ()=>{

            libraryScreen.style.display =
                'none';

            await processPdf(
                item.file,
                item.id
            );

        };

        const remove =
            document.createElement('button');

        remove.className =
            'remove-btn';

        remove.textContent =
            '×';

        remove.onclick =
            async event=>{

            event.stopPropagation();

            await deletePdf(
                item.id
            );

            renderLibrary();

        };

        row.appendChild(name);

        row.appendChild(remove);

        libraryList.appendChild(row);

    });

}

/* NOTES */

async function openNotes(){

    notesScreen.style.display =
        'block';

    notesContent.innerHTML = '';

    const library =
        await getLibrary();

    const current =
        library.find(
            item=>
            item.id === currentPdfId
        );

    const notes =
        current?.notes || {};

    currentBlocks.forEach(
        (block,index)=>{

        if(
            block.type !==
            'paragraph'
        ){
            return;
        }

        const wrapper =
            document.createElement('div');

        wrapper.className =
            'note-line';

        const source =
            document.createElement('div');

        source.className =
            'note-source';

        source.textContent =
            block.text;

        const textarea =
            document.createElement('textarea');

        textarea.className =
            'note-input';

        textarea.placeholder =
            'Write notes...';

        textarea.value =
            notes[index] || '';

        textarea.addEventListener(
            'input',
            async ()=>{

            notes[index] =
                textarea.value;

            await savePdfToLibrary(
                current.id,
                current.name,
                current.file,
                notes
            );

        });

        wrapper.appendChild(source);

        wrapper.appendChild(textarea);

        notesContent.appendChild(wrapper);

    });

}

/* COPY NOTES */

document
    .getElementById('copyNotes')
    .addEventListener(
        'click',
        ()=>{

        const notes =
            [
                ...document.querySelectorAll(
                    '.note-input'
                )
            ]
            .map(
                note=>note.value
            )
            .join('\n\n');

        navigator.clipboard.writeText(
            notes
        );

});

/* SWIPE */

let touchStartX = 0;

document.addEventListener(
    'touchstart',
    event=>{

    touchStartX =
        event.changedTouches[0]
        .screenX;

});

document.addEventListener(
    'touchend',
    event=>{

    const endX =
        event.changedTouches[0]
        .screenX;

    if(
        endX - touchStartX > 120
        &&
        currentPdfId
    ){

        openNotes();
    }

});

/* BUTTONS */

processBtn.addEventListener(
    'click',
    ()=>{

    processPdf(
        pdfFile.files[0]
    );

});

libraryBtn.addEventListener(
    'click',
    async ()=>{

    libraryScreen.style.display =
        'block';

    renderLibrary();

});

document
    .getElementById('closeLibrary')
    .addEventListener(
        'click',
        ()=>{

        libraryScreen.style.display =
            'none';

});

document
    .getElementById('closeNotes')
    .addEventListener(
        'click',
        ()=>{

        notesScreen.style.display =
            'none';

});

/* FONT */

fontToggle.addEventListener(
    'click',
    ()=>{

    fontPanel.style.display =

        fontPanel.style.display ===
        'block'

        ? 'none'
        : 'block';

});

document
    .getElementById('fontUp')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize += 0.08;

        updateFont();

});

document
    .getElementById('fontDown')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize =
            Math.max(
                0.75,
                currentFontSize - 0.08
            );

        updateFont();

});

/* AUTO LOAD */

window.addEventListener(
    'load',
    async ()=>{

    const items =
        await getLibrary();

    if(items.length){

        const latest =
            items[items.length - 1];

        processPdf(
            latest.file,
            latest.id
        );

    }

});

/* SERVICE WORKER */

if(
    'serviceWorker'
    in navigator
){

    window.addEventListener(
        'load',
        ()=>{

        navigator.serviceWorker.register(
            './service-worker.js'
        );

    });

}

</script>

</body>
</html>
