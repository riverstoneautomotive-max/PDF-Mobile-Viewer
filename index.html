<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>AI PDF Mobile Reader</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#11130f">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&display=swap"
    rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{

    --bg:#11130f;

    --panel:#1a1c17;

    --border:#35382f;

    --text:#f3f1ea;

    --muted:#9d9987;

    --accent:#9d9162;

    --accent-dark:#7f744d;

    --accent-light:#cab97f;

    --line-height:40px;
}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;

    padding:0;

    width:100%;

    height:100%;

    overflow:hidden;

    background:var(--bg);

    color:var(--text);

    font-family:'Source Serif 4', serif;

    -webkit-font-smoothing:antialiased;
}

body{

    touch-action:pan-y;
}

.viewport{

    position:fixed;

    inset:0;

    overflow:hidden;
}

.panels{

    display:flex;

    width:200vw;

    height:100vh;

    transition:transform 0.36s cubic-bezier(.25,.8,.25,1);

    transform:translateX(0);
}

.panel{

    width:100vw;

    height:100vh;

    overflow-y:auto;

    overflow-x:hidden;

    overscroll-behavior:contain;
}

header{

    width:100%;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.toolbar{

    display:flex;

    flex-wrap:wrap;

    align-items:center;

    gap:10px;
}

input[type="file"]{

    color:var(--muted);

    font-family:inherit;

    max-width:170px;
}

button{

    border:none;

    border-radius:14px;

    padding:12px 18px;

    background:var(--accent);

    color:#161710;

    font-weight:700;

    cursor:pointer;

    font-family:inherit;

    transition:0.2s;
}

button:hover{

    background:var(--accent-light);
}

#status{

    color:var(--muted);

    font-size:14px;
}

.progress-wrapper{

    width:100%;

    height:8px;

    background:#272922;

    border-radius:999px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{

    width:0%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--accent-dark),
        var(--accent-light)
    );

    transition:width 0.25s ease;
}

.font-row{

    display:flex;

    justify-content:flex-end;

    padding:12px 16px 0;
}

.floating{

    display:none;

    position:relative;
}

.fab{

    width:38px;

    height:38px;

    border-radius:999px;

    padding:0;

    background:#1a1c17;

    border:1px solid var(--border);

    color:var(--text);

    display:flex;

    align-items:center;

    justify-content:center;
}

.font-panel{

    position:absolute;

    top:50px;

    right:0;

    width:170px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:14px;

    display:none;
}

.font-controls{

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.font-btn{

    width:38px;

    height:38px;

    border-radius:12px;

    background:#2b2e25;

    color:var(--text);

    padding:0;
}

main{

    width:100%;

    max-width:860px;

    margin:0 auto;

    padding:0 24px 120px;
}

.section{

    width:100%;

    font-size:1rem;

    line-height:1.68;
}

.smart-heading{

    font-size:2rem;

    line-height:1.14;

    margin-top:3rem;

    margin-bottom:1.3rem;

    font-weight:700;
}

.smart-paragraph{

    margin:0 0 1.55rem;

    text-align:justify;
}

.loading{

    text-align:center;

    padding:90px 20px;

    color:var(--muted);
}

.notes-panel{

    background:var(--bg);
}

.notes-header{

    padding:16px;

    display:flex;

    justify-content:flex-end;

    border-bottom:1px solid var(--border);

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);
}

.copy-btn{

    width:42px;

    height:42px;

    border-radius:999px;

    padding:0;

    font-size:18px;
}

.notes-wrapper{

    width:100%;

    max-width:860px;

    margin:0 auto;

    padding:0 24px 120px;
}

.notes-inner{

    position:relative;

    width:100%;
}

.ruling-layer{

    position:absolute;

    inset:0;

    pointer-events:none;

    z-index:1;
}

.ruling-line{

    position:absolute;

    left:0;

    right:0;

    height:1px;

    background:rgba(157,153,135,0.18);
}

.cells-layer{

    position:absolute;

    inset:0;

    z-index:2;
}

.note-row{

    position:absolute;

    left:0;

    right:0;

    height:40px;
}

.note-input{

    position:absolute;

    top:0;

    left:0;

    width:100%;

    min-height:40px;

    padding:0;

    margin:0;

    background:transparent;

    border:none;

    outline:none;

    resize:none;

    overflow:hidden;

    color:var(--text);

    font-family:'Source Serif 4', serif;

    font-size:1rem;

    line-height:40px;

    white-space:pre-wrap;

    display:block;

    caret-color:var(--accent-light);

    z-index:10;
}

.note-input.editing{

    background:rgba(17,19,15,0.05);
}

.note-input.closed{

    cursor:text;
}

.note-input.covered{

    pointer-events:none;
}

.library-overlay{

    position:fixed;

    inset:0;

    background:var(--bg);

    z-index:4000;

    display:none;

    overflow-y:auto;
}

.library-header{

    position:sticky;

    top:0;

    padding:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    background:rgba(17,19,15,0.96);

    border-bottom:1px solid var(--border);

    backdrop-filter:blur(14px);
}

.icon-btn{

    background:none;

    color:var(--text);

    padding:0;

    font-size:24px;
}

.library-list{

    padding:18px;
}

.library-item{

    display:flex;

    align-items:center;

    gap:12px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:16px;

    margin-bottom:14px;
}

.library-name{

    flex:1;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

    cursor:pointer;
}

.remove-btn{

    width:30px;

    height:30px;

    border-radius:999px;

    padding:0;

    background:#2b2e25;

    color:var(--text);

    font-size:16px;
}

::-webkit-scrollbar{

    width:10px;
}

::-webkit-scrollbar-thumb{

    background:#3c4035;

    border-radius:999px;
}

</style>
</head>

<body>

<div class="viewport">

    <div
        class="panels"
        id="panels">

        <div
            class="panel"
            id="readerPanel">

            <header>

                <div class="toolbar">

                    <button id="libraryBtn">
                        Library
                    </button>

                    <input
                        type="file"
                        id="pdfFile"
                        accept="application/pdf"
                    />

                    <button id="processBtn">
                        Extract PDF
                    </button>

                    <span id="status">
                        Ready
                    </span>

                </div>

                <div class="progress-wrapper">

                    <div
                        class="progress-bar"
                        id="progressBar">
                    </div>

                </div>

            </header>

            <div class="font-row">

                <div
                    class="floating"
                    id="fontControls">

                    <button
                        class="fab"
                        id="fontToggle">
                        A+
                    </button>

                    <div
                        class="font-panel"
                        id="fontPanel">

                        <div class="font-controls">

                            <button
                                class="font-btn"
                                id="fontDown">
                                −
                            </button>

                            <div id="fontSizeDisplay">
                                1.00x
                            </div>

                            <button
                                class="font-btn"
                                id="fontUp">
                                +
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <main>

                <section id="reader">

                    <div class="loading">
                        Upload a PDF to begin.
                    </div>

                </section>

            </main>

        </div>

        <div
            class="panel notes-panel"
            id="notesPanel">

            <div class="notes-header">

                <button
                    class="copy-btn"
                    id="copyNotes">
                    ⧉
                </button>

            </div>

            <div
                class="notes-wrapper"
                id="notesWrapper">
            </div>

        </div>

    </div>

</div>

<script>

const notesWrapper =
    document.getElementById('notesWrapper');

let activeInput = null;

function autoResize(textarea){

    textarea.style.height =
        '40px';

    textarea.style.height =
        textarea.scrollHeight + 'px';

}

function updateCoveredCells(){

    const inputs =
        [
            ...document.querySelectorAll('.note-input')
        ];

    inputs.forEach(input=>{

        input.classList.remove(
            'covered'
        );

        input.style.zIndex = '10';

    });

    inputs.forEach(input=>{

        const startLine =
            Number(input.dataset.line);

        const visualHeight =
            input.offsetHeight;

        const coveredLines =
            Math.ceil(
                visualHeight / 40
            ) - 1;

        if(coveredLines <= 0){
            return;
        }

        input.style.zIndex =
            1000 + startLine;

        for(
            let i=1;
            i<=coveredLines;
            i++
        ){

            const coveredInput =
                document.querySelector(
                    '.note-input[data-line="' +
                    (startLine + i) +
                    '"]'
                );

            if(
                coveredInput
                &&
                coveredInput !== input
            ){

                coveredInput.classList.add(
                    'covered'
                );

            }

        }

    });

}

async function closeCurrentInput(){

    if(!activeInput){
        return;
    }

    activeInput.blur();

    activeInput.readOnly =
        true;

    activeInput.classList.remove(
        'editing'
    );

    activeInput.classList.add(
        'closed'
    );

    activeInput = null;

    updateCoveredCells();

}

function createNotebook(){

    notesWrapper.innerHTML = '';

    const notesInner =
        document.createElement('div');

    notesInner.className =
        'notes-inner';

    notesInner.style.height =
        '4000px';

    const rulingLayer =
        document.createElement('div');

    rulingLayer.className =
        'ruling-layer';

    const cellsLayer =
        document.createElement('div');

    cellsLayer.className =
        'cells-layer';

    for(
        let i=0;
        i<100;
        i++
    ){

        const line =
            document.createElement('div');

        line.className =
            'ruling-line';

        line.style.top =
            ((i + 1) * 40) - 1 + 'px';

        rulingLayer.appendChild(line);

    }

    for(
        let i=0;
        i<100;
        i++
    ){

        const row =
            document.createElement('div');

        row.className =
            'note-row';

        row.style.top =
            (i * 40) + 'px';

        const input =
            document.createElement('textarea');

        input.className =
            'note-input closed';

        input.dataset.line =
            i;

        input.readOnly =
            true;

        input.spellcheck =
            false;

        input.addEventListener(
            'click',
            event=>{

            event.stopPropagation();

            if(
                input.classList.contains(
                    'covered'
                )
            ){
                return;
            }

            if(
                activeInput
                &&
                activeInput !== input
            ){
                return;
            }

            activeInput = input;

            input.readOnly =
                false;

            input.classList.remove(
                'closed'
            );

            input.classList.add(
                'editing'
            );

            input.focus();

        });

        input.addEventListener(
            'input',
            ()=>{

            autoResize(input);

            updateCoveredCells();

        });

        row.appendChild(input);

        cellsLayer.appendChild(row);

    }

    notesInner.appendChild(
        rulingLayer
    );

    notesInner.appendChild(
        cellsLayer
    );

    notesWrapper.appendChild(
        notesInner
    );

    requestAnimationFrame(()=>{

        updateCoveredCells();

    });

}

document.addEventListener(
    'click',
    async event=>{

    const clickedInput =
        event.target.classList.contains(
            'note-input'
        );

    if(!clickedInput){

        await closeCurrentInput();

    }

});

createNotebook();

</script>

</body>
</html>
