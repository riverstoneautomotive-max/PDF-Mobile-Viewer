<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>AI PDF Mobile Reader</title>

<link rel="manifest" href="manifest.json">

<meta
    name="theme-color"
    content="#11130f"
/>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
/>

<link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&display=swap"
    rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{

    --bg:#11130f;

    --panel:#1a1c17;

    --border:#35382f;

    --text:#f3f1ea;

    --muted:#9d9987;

    --accent:#9d9162;

    --accent-light:#cab97f;

    --line-height:40px;
}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;

    padding:0;

    width:100%;

    overflow:hidden;

    background:var(--bg);

    color:var(--text);

    font-family:'Source Serif 4', serif;

    -webkit-font-smoothing:antialiased;

    text-rendering:optimizeLegibility;
}

body{

    touch-action:pan-y;
}

/* APP */

.app{

    width:200vw;

    display:flex;

    transition:transform 0.35s ease;
}

.app.notes-open{

    transform:translateX(-100vw);
}

/* PAGE */

.page{

    width:100vw;

    height:100vh;

    overflow-y:auto;

    overflow-x:hidden;

    background:var(--bg);
}

/* HEADER */

header{

    position:sticky;

    top:0;

    z-index:500;

    width:100%;

    padding:16px;

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.toolbar{

    display:flex;

    flex-wrap:wrap;

    align-items:center;

    gap:12px;
}

input[type="file"]{

    color:var(--muted);

    font-family:inherit;
}

button{

    border:none;

    border-radius:14px;

    padding:12px 18px;

    background:var(--accent);

    color:#161710;

    font-weight:700;

    cursor:pointer;

    font-family:inherit;
}

button:hover{

    background:var(--accent-light);
}

#status{

    color:var(--muted);

    font-size:14px;
}

/* PROGRESS */

.progress-wrapper{

    width:100%;

    height:8px;

    background:#272922;

    border-radius:999px;

    overflow:hidden;

    margin-top:14px;
}

.progress-bar{

    width:0%;

    height:100%;

    background:linear-gradient(
        90deg,
        var(--accent),
        var(--accent-light)
    );

    transition:width 0.25s ease;
}

/* FONT BAR */

.font-bar{

    display:flex;

    justify-content:flex-end;

    padding:10px 16px 0;
}

.fab{

    width:38px;

    height:38px;

    border-radius:999px;

    background:#1d1f19;

    border:1px solid var(--border);

    color:var(--text);

    font-size:13px;

    font-weight:700;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;
}

.font-panel{

    position:absolute;

    right:16px;

    top:140px;

    width:170px;

    background:#1b1d18;

    border:1px solid var(--border);

    border-radius:18px;

    padding:14px;

    display:none;

    z-index:2000;
}

.font-controls{

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.font-btn{

    width:38px;

    height:38px;

    border-radius:12px;

    border:none;

    background:#2b2e25;

    color:var(--text);

    font-size:16px;
}

.font-size-display{

    color:var(--muted);
}

/* MAIN */

main{

    width:100%;

    max-width:860px;

    margin:0 auto;

    padding:12px 24px 120px;
}

/* DOCUMENT */

.section{

    width:100%;

    line-height:1.68;

    font-size:1rem;
}

.smart-heading{

    font-size:2rem;

    margin-top:3rem;

    margin-bottom:1.2rem;

    line-height:1.15;
}

.smart-paragraph{

    margin:0 0 1.55rem;

    text-align:justify;
}

/* LOADING */

.loading{

    text-align:center;

    padding:90px 20px;

    color:var(--muted);
}

/* NOTES PAGE */

.notes-header{

    position:sticky;

    top:0;

    z-index:500;

    display:flex;

    justify-content:flex-end;

    align-items:center;

    padding:16px;

    border-bottom:1px solid var(--border);

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);
}

.copy-btn{

    width:44px;

    height:44px;

    border-radius:14px;

    font-size:18px;

    padding:0;
}

/* NOTEBOOK */

.notes-wrapper{

    width:100%;

    max-width:860px;

    margin:0 auto;

    padding:0 24px 120px;
}

/* NOTE ROW */

.note-row{

    position:relative;

    width:100%;

    min-height:40px;
}

/* RULE */

.note-rule{

    position:absolute;

    left:0;

    right:0;

    top:39px;

    height:1px;

    background:rgba(157,153,135,0.18);

    pointer-events:none;

    z-index:1;
}

/* CELL */

.note-cell{

    position:relative;

    z-index:2;

    width:100%;
}

/* TEXTAREA */

.note-input{

    width:100%;

    min-height:40px;

    padding:0;

    margin:0;

    border:none;

    outline:none;

    resize:none;

    overflow:hidden;

    background:transparent !important;

    color:var(--text);

    font-family:'Source Serif 4', serif;

    font-size:1rem;

    line-height:40px;

    white-space:pre-wrap;

    display:block;

    position:relative;

    z-index:2;

    caret-color:var(--accent-light);
}

/* CLOSED */

.note-input.closed{

    cursor:text;
}

/* DISABLED */

.note-input.disabled{

    pointer-events:none;

    opacity:0.6;
}

/* LIBRARY */

.library-overlay{

    position:fixed;

    inset:0;

    background:var(--bg);

    z-index:3000;

    display:none;

    overflow-y:auto;
}

.library-header{

    position:sticky;

    top:0;

    z-index:100;

    display:flex;

    align-items:center;

    gap:14px;

    padding:16px;

    border-bottom:1px solid var(--border);

    background:rgba(17,19,15,0.96);

    backdrop-filter:blur(14px);
}

.back-btn{

    width:44px;

    height:44px;

    border-radius:14px;

    padding:0;
}

.library-list{

    padding:20px;
}

.library-item{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:14px;

    background:#1a1c17;

    border:1px solid var(--border);

    border-radius:18px;

    padding:18px;

    margin-bottom:16px;
}

.library-name{

    flex:1;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;
}

.remove-btn{

    width:34px;

    height:34px;

    border-radius:999px;

    padding:0;

    font-size:18px;
}

</style>
</head>

<body>

<div
    class="app"
    id="app">

    <!-- PDF PAGE -->

    <section
        class="page"
        id="pdfPage">

        <header>

            <div class="toolbar">

                <button id="libraryBtn">
                    Library
                </button>

                <input
                    type="file"
                    id="pdfFile"
                    accept="application/pdf"
                />

                <button id="processBtn">
                    Extract PDF
                </button>

                <span id="status">
                    Ready
                </span>

            </div>

            <div class="progress-wrapper">

                <div
                    class="progress-bar"
                    id="progressBar">
                </div>

            </div>

        </header>

        <div class="font-bar">

            <button
                class="fab"
                id="fontToggle">
                A+
            </button>

        </div>

        <div
            class="font-panel"
            id="fontPanel">

            <div class="font-controls">

                <button
                    class="font-btn"
                    id="fontDown">
                    −
                </button>

                <div
                    class="font-size-display"
                    id="fontSizeDisplay">
                    1.00x
                </div>

                <button
                    class="font-btn"
                    id="fontUp">
                    +
                </button>

            </div>

        </div>

        <main>

            <section
                id="reader">

                <div class="loading">
                    Upload a PDF to begin.
                </div>

            </section>

        </main>

    </section>

    <!-- NOTES PAGE -->

    <section
        class="page"
        id="notesPage">

        <div class="notes-header">

            <button
                class="copy-btn"
                id="copyBtn">
                ⧉
            </button>

        </div>

        <div
            class="notes-wrapper"
            id="notesWrapper">
        </div>

    </section>

</div>

<!-- LIBRARY -->

<div
    class="library-overlay"
    id="libraryOverlay">

    <div class="library-header">

        <button
            class="back-btn"
            id="closeLibrary">
            ←
        </button>

        <div>
            Library
        </div>

    </div>

    <div
        class="library-list"
        id="libraryList">
    </div>

</div>

<script>

/* PDF */

const pdfjsLib =
    window['pdfjs-dist/build/pdf'];

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ELEMENTS */

const app =
    document.getElementById('app');

const pdfPage =
    document.getElementById('pdfPage');

const notesPage =
    document.getElementById('notesPage');

const reader =
    document.getElementById('reader');

const notesWrapper =
    document.getElementById('notesWrapper');

const pdfFile =
    document.getElementById('pdfFile');

const processBtn =
    document.getElementById('processBtn');

const libraryBtn =
    document.getElementById('libraryBtn');

const libraryOverlay =
    document.getElementById('libraryOverlay');

const libraryList =
    document.getElementById('libraryList');

const closeLibrary =
    document.getElementById('closeLibrary');

const statusText =
    document.getElementById('status');

const progressBar =
    document.getElementById('progressBar');

const fontToggle =
    document.getElementById('fontToggle');

const fontPanel =
    document.getElementById('fontPanel');

const fontSizeDisplay =
    document.getElementById('fontSizeDisplay');

const copyBtn =
    document.getElementById('copyBtn');

/* STORAGE */

const DB_NAME =
    'pdf-reader-library';

const STORE =
    'documents';

let currentDocId = null;

let currentFontSize = 1.00;

let activeInput = null;

/* DATABASE */

function openDB(){

    return new Promise((resolve,reject)=>{

        const request =
            indexedDB.open(DB_NAME,1);

        request.onupgradeneeded =
            e=>{

            const db =
                e.target.result;

            if(
                !db.objectStoreNames.contains(
                    STORE
                )
            ){

                db.createObjectStore(
                    STORE,
                    {
                        keyPath:'id'
                    }
                );

            }

        };

        request.onsuccess =
            ()=>resolve(
                request.result
            );

        request.onerror =
            ()=>reject(
                request.error
            );

    });

}

/* SAVE DOC */

async function saveDocument(doc){

    const db =
        await openDB();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE,
                'readwrite'
            );

        tx.objectStore(STORE)
            .put(doc);

        tx.oncomplete =
            ()=>resolve();

    });

}

/* GET DOCS */

async function getAllDocuments(){

    const db =
        await openDB();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE,
                'readonly'
            );

        const request =
            tx.objectStore(STORE)
            .getAll();

        request.onsuccess =
            ()=>resolve(
                request.result || []
            );

    });

}

/* DELETE DOC */

async function deleteDocument(id){

    const db =
        await openDB();

    return new Promise(resolve=>{

        const tx =
            db.transaction(
                STORE,
                'readwrite'
            );

        tx.objectStore(STORE)
            .delete(id);

        tx.oncomplete =
            ()=>resolve();

    });

}

/* STATUS */

function setStatus(text){

    statusText.textContent =
        text;
}

/* PROGRESS */

function setProgress(percent){

    progressBar.style.width =
        percent + '%';
}

/* FONT */

function updateFont(){

    document
        .querySelectorAll('.section')
        .forEach(section=>{

        section.style.fontSize =
            currentFontSize + 'rem';

    });

    document
        .querySelectorAll('.note-input')
        .forEach(input=>{

        input.style.fontSize =
            currentFontSize + 'rem';

    });

    fontSizeDisplay.textContent =
        currentFontSize.toFixed(2) + 'x';
}

/* CLEAN */

function cleanText(text){

    return text

        .replace(/\s+/g,' ')

        .replace(/-\s+/g,'')

        .trim();
}

/* BUILD */

function buildBlocks(items){

    const blocks = [];

    let current = '';

    items.forEach(item=>{

        const text =
            cleanText(item.str);

        if(!text){
            return;
        }

        current +=
            text + ' ';

        if(
            /[.!?]$/.test(text)
        ){

            blocks.push(
                current
            );

            current = '';

        }

    });

    return blocks;
}

/* RENDER */

function renderBlocks(blocks){

    reader.innerHTML = '';

    const wrapper =
        document.createElement('section');

    wrapper.className =
        'section';

    blocks.forEach(text=>{

        const p =
            document.createElement('p');

        p.className =
            'smart-paragraph';

        p.textContent =
            text;

        wrapper.appendChild(p);

    });

    reader.appendChild(wrapper);

    updateFont();
}

/* AUTO RESIZE */

function autoResize(el){

    el.style.height =
        'auto';

    el.style.height =
        el.scrollHeight + 'px';
}

/* UPDATE AVAILABILITY */

function updateCellAvailability(){

    document
        .querySelectorAll('.note-input')
        .forEach(el=>{

        if(
            activeInput
            &&
            el !== activeInput
        ){

            el.classList.add(
                'disabled'
            );

        }else{

            el.classList.remove(
                'disabled'
            );

        }

    });

}

/* SAVE NOTES */

async function saveNotes(){

    if(!currentDocId){
        return;
    }

    const docs =
        await getAllDocuments();

    const doc =
        docs.find(
            d=>d.id === currentDocId
        );

    if(!doc){
        return;
    }

    const notes = {};

    document
        .querySelectorAll('.note-input')
        .forEach(input=>{

        if(
            input.value.trim()
        ){

            notes[
                input.dataset.line
            ] = input.value;

        }

    });

    doc.notes = notes;

    await saveDocument(doc);

}

/* NOTEBOOK */

function createNotebook(
    totalHeight,
    savedNotes={}
){

    notesWrapper.innerHTML = '';

    const lineCount =
        Math.ceil(
            totalHeight / 40
        ) + 80;

    for(
        let i=0;
        i<lineCount;
        i++
    ){

        const row =
            document.createElement('div');

        row.className =
            'note-row';

        const rule =
            document.createElement('div');

        rule.className =
            'note-rule';

        const cell =
            document.createElement('div');

        cell.className =
            'note-cell';

        const input =
            document.createElement('textarea');

        input.className =
            'note-input closed';

        input.dataset.line =
            i;

        input.readOnly =
            true;

        input.spellcheck =
            false;

        input.value =
            savedNotes[i] || '';

        autoResize(input);

        /* OPEN */

        input.addEventListener(
            'click',
            event=>{

            event.stopPropagation();

            if(
                activeInput
                &&
                activeInput !== input
            ){

                return;
            }

            activeInput =
                input;

            input.readOnly =
                false;

            input.classList.remove(
                'closed'
            );

            updateCellAvailability();

            input.focus();

            const length =
                input.value.length;

            input.setSelectionRange(
                length,
                length
            );

        });

        /* INPUT */

        input.addEventListener(
            'input',
            ()=>{

            autoResize(input);

            saveNotes();

        });

        cell.appendChild(input);

        row.appendChild(rule);

        row.appendChild(cell);

        notesWrapper.appendChild(row);

    }

    updateFont();

}

/* CLOSE ACTIVE CELL */

document.addEventListener(
    'click',
    event=>{

    if(
        event.target.classList.contains(
            'note-input'
        )
    ){

        return;
    }

    if(activeInput){

        activeInput.readOnly =
            true;

        activeInput.classList.add(
            'closed'
        );

        activeInput.blur();

        saveNotes();

        activeInput = null;

        updateCellAvailability();

    }

});

/* PROCESS PDF */

async function processPdf(
    file,
    existingId=null,
    existingNotes={}
){

    try{

        currentDocId =
            existingId
            ||
            crypto.randomUUID();

        reader.innerHTML = `
            <div class="loading">
                Processing PDF...
            </div>
        `;

        setStatus(
            'Loading PDF...'
        );

        setProgress(0);

        const buffer =
            await file.arrayBuffer();

        const loadingTask =
            pdfjsLib.getDocument({
                data:buffer
            });

        const pdf =
            await loadingTask.promise;

        const items = [];

        for(
            let page=1;
            page<=pdf.numPages;
            page++
        ){

            setStatus(
                `Reading page ${page} of ${pdf.numPages}`
            );

            const p =
                await pdf.getPage(page);

            const content =
                await p.getTextContent();

            items.push(
                ...content.items
            );

            setProgress(
                (
                    page /
                    pdf.numPages
                ) * 100
            );

        }

        const blocks =
            buildBlocks(items);

        renderBlocks(blocks);

        createNotebook(
            reader.scrollHeight,
            existingNotes
        );

        await saveDocument({

            id:currentDocId,

            name:file.name,

            file,

            notes:existingNotes

        });

        localStorage.setItem(
            'last-opened-pdf',
            currentDocId
        );

        setStatus(
            'Complete'
        );

        setProgress(100);

    }catch(error){

        console.error(error);

        setStatus('Error');

        reader.innerHTML = `
            <div class="loading">
                Error processing PDF.
            </div>
        `;
    }

}

/* PROCESS BUTTON */

processBtn.addEventListener(
    'click',
    ()=>{

    const file =
        pdfFile.files[0];

    if(!file){

        alert(
            'Please choose a PDF.'
        );

        return;
    }

    processPdf(file);

});

/* LIBRARY */

libraryBtn.addEventListener(
    'click',
    async ()=>{

    libraryOverlay.style.display =
        'block';

    const docs =
        await getAllDocuments();

    libraryList.innerHTML = '';

    if(!docs.length){

        libraryList.innerHTML = `
            <div class="loading">
                No saved PDFs.
            </div>
        `;

        return;
    }

    docs.reverse().forEach(doc=>{

        const item =
            document.createElement('div');

        item.className =
            'library-item';

        const name =
            document.createElement('div');

        name.className =
            'library-name';

        name.textContent =
            doc.name;

        const openBtn =
            document.createElement('button');

        openBtn.textContent =
            'Open';

        openBtn.addEventListener(
            'click',
            async ()=>{

            libraryOverlay.style.display =
                'none';

            await processPdf(
                doc.file,
                doc.id,
                doc.notes || {}
            );

        });

        const remove =
            document.createElement('button');

        remove.className =
            'remove-btn';

        remove.textContent =
            '×';

        remove.addEventListener(
            'click',
            async e=>{

            e.stopPropagation();

            await deleteDocument(
                doc.id
            );

            item.remove();

        });

        item.appendChild(name);

        item.appendChild(openBtn);

        item.appendChild(remove);

        libraryList.appendChild(item);

    });

});

/* CLOSE LIBRARY */

closeLibrary.addEventListener(
    'click',
    ()=>{

    libraryOverlay.style.display =
        'none';

});

/* AUTO LOAD */

window.addEventListener(
    'load',
    async ()=>{

    const lastId =
        localStorage.getItem(
            'last-opened-pdf'
        );

    if(!lastId){
        return;
    }

    const docs =
        await getAllDocuments();

    const doc =
        docs.find(
            d=>d.id === lastId
        );

    if(doc){

        await processPdf(
            doc.file,
            doc.id,
            doc.notes || {}
        );

    }

});

/* SWIPE */

let startX = 0;

document.addEventListener(
    'touchstart',
    e=>{

    startX =
        e.touches[0].clientX;

});

document.addEventListener(
    'touchend',
    e=>{

    const endX =
        e.changedTouches[0].clientX;

    const diff =
        startX - endX;

    /* OPEN NOTES */

    if(diff > 70){

        const ratio =
            pdfPage.scrollTop /
            (
                pdfPage.scrollHeight -
                window.innerHeight
            );

        notesPage.scrollTop =
            ratio *
            (
                notesPage.scrollHeight -
                window.innerHeight
            );

        app.classList.add(
            'notes-open'
        );

    }

    /* RETURN PDF */

    if(diff < -70){

        const ratio =
            notesPage.scrollTop /
            (
                notesPage.scrollHeight -
                window.innerHeight
            );

        pdfPage.scrollTop =
            ratio *
            (
                pdfPage.scrollHeight -
                window.innerHeight
            );

        app.classList.remove(
            'notes-open'
        );

    }

});

/* COPY */

copyBtn.addEventListener(
    'click',
    ()=>{

    let text = '';

    document
        .querySelectorAll('.note-input')
        .forEach(input=>{

        if(
            input.value.trim()
        ){

            text +=
                input.value + '\n';

        }

    });

    navigator.clipboard.writeText(
        text
    );

});

/* FONT PANEL */

fontToggle.addEventListener(
    'click',
    ()=>{

    fontPanel.style.display =

        fontPanel.style.display ===
        'block'

        ? 'none'
        : 'block';

});

/* FONT UP */

document
    .getElementById('fontUp')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize += 0.08;

        updateFont();

});

/* FONT DOWN */

document
    .getElementById('fontDown')
    .addEventListener(
        'click',
        ()=>{

        currentFontSize =
            Math.max(
                0.75,
                currentFontSize - 0.08
            );

        updateFont();

});

/* SERVICE WORKER */

if(
    'serviceWorker'
    in navigator
){

    window.addEventListener(
        'load',
        ()=>{

        navigator
            .serviceWorker
            .register(
                './service-worker.js'
            );

    });

}

</script>
